# DoIt theme version
version = "0.4.X"

description = "刘邦的博客"
keywords = ["c++", "java", "go", "kv", "storage", "compiler"]
# light, dark, black, auto
defaultTheme = "auto"
gitRepo = "https://github.com/liubang/blog"
dateFormat = "2006-01-02"
images = ["/images/logo.svg"]
enablePWA = false
license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

# Author config
[author]
name = "liubang"
email = "it.liubang@gmail.com"
link = "https://github.com/liubang"
avatar = "/images/profile.png"

# App icon config
[app]
title = "星河拾贝录"
noFavicon = false
svgFavicon = "/images/logo.svg"
iconColor = "#5bbad5"
tileColor = "#da532c"

# Search config (Fuse.js, no external service needed)
[search]
enable = true
type = "fuse"
contentLength = 4000
placeholder = ""
maxResultLength = 10
snippetLength = 30
highlightTag = "em"
absoluteURL = false
[search.fuse]
isCaseSensitive = false
minMatchCharLength = 3
findAllMatches = false
location = 0
threshold = 0.1
distance = 100
ignoreLocation = false
useExtendedSearch = false
ignoreFieldNorm = false

# Header config
[header]
themeChangeMode = "select"
[header.title]
logo = "/images/logo.svg"
name = "星河拾贝录"
pre = ""
post = ""
typeit = false

# Footer config
[footer]
enable = true
custom = ''
hugo = true
hostedOn = '<a title="GitHub Pages" href="https://docs.github.com/en/pages/" target="_blank" rel="noopener noreferrer">GitHub Pages</a>'
copyright = true
author = true
since = 2019
icp = ""
license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

# Section page config
[section]
paginate = 30
dateFormat = "01-02"
rss = 10

# List page config
[list]
paginate = 20
dateFormat = "01-02"
rss = 10

# Home page config
[home]
rss = 10
[home.profile]
enable = true
gravatarEmail = ""
avatarURL = "/images/profile.png"
avatarLinkURL = "https://github.com/liubang"
title = ""
subtitle = "Whether you are an antelope or a lion, you ought to dash forward without hesitation when the sun rises."
typeit = true
social = true
disclaimer = ""
[home.posts]
enable = true
paginate = 10
defaultHiddenFromHomePage = false

# Social config
[social]
GitHub = "liubang"
Weibo = "2113750192"
QQ = "1301841042"
Email = "it.liubang@gmail.com"
RSS = true

# Page config
[page]
hiddenFromHomePage = false
hiddenFromSearch = false
twemoji = false
lightgallery = false
ruby = true
fraction = true
linkToMarkdown = false
linkToSource = false
linkToEdit = false
linkToReport = false
rssFullText = false
seriesNavigation = true
enableLastMod = true
enableWordCount = true
enableReadingTime = true

[page.outdatedArticleReminder]
enable = false
reminder = 90
warning = 180

[page.toc]
enable = true
auto = true
keepStatic = false

[page.code]
copy = true
maxShownLines = 99999

[page.library]
  [page.library.js]
    [page.library.js.flux-highlight]
      src = "/js/flux-highlight.js"
      defer = true

# Math (KaTeX)
[page.math]
enable = true
copyTex = true
mermaid = true
inlineLeftDelimiter = ""
inlineRightDelimiter = ""
blockLeftDelimiter = ""
blockRightDelimiter = ""

# Mapbox
[page.mapbox]
accessToken = ""
lightStyle = "mapbox://styles/mapbox/light-v10?optimize=true"
darkStyle = "mapbox://styles/mapbox/dark-v10?optimize=true"
navigation = true
geolocate = false
scale = false
fullscreen = false

# Social share
[page.share]
enable = false

# Comment: utterances
[page.comment]
enable = true
[page.comment.utterances]
enable = true
repo = "liubang/blog"
issueTerm = "pathname"
label = ""
lightTheme = "github-light"
darkTheme = "github-dark"

# CDN config
[cdn]
data = ""

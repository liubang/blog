<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320">
  <defs>
    <style>
      .title { font: 700 26px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 17px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .box1 { fill: #f7fbff; stroke: #77a6d8; stroke-width: 2; rx: 18; }
      .box2 { fill: #eefaf3; stroke: #6bb58d; stroke-width: 2; rx: 18; }
      .box3 { fill: #fff8e8; stroke: #d8b15a; stroke-width: 2; rx: 18; }
      .arrow { stroke: #5e8fbe; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5e8fbe"/>
    </marker>
  </defs>
  <rect width="960" height="320" fill="#ffffff"/>
  <text x="40" y="46" class="title">Tokenizer 编解码流程</text>
  <rect x="40" y="95" width="180" height="120" class="box1"/>
  <text x="130" y="128" text-anchor="middle" class="label">原始文本</text>
  <text x="130" y="160" text-anchor="middle" class="sub">helpfulness</text>
  <rect x="270" y="95" width="180" height="120" class="box2"/>
  <text x="360" y="128" text-anchor="middle" class="label">切分 Token</text>
  <text x="360" y="160" text-anchor="middle" class="sub">help + fulness</text>
  <rect x="500" y="95" width="180" height="120" class="box3"/>
  <text x="590" y="128" text-anchor="middle" class="label">映射 ID</text>
  <text x="590" y="160" text-anchor="middle" class="sub">[1839, 52177]</text>
  <rect x="730" y="95" width="180" height="120" class="box1"/>
  <text x="820" y="128" text-anchor="middle" class="label">解码输出</text>
  <text x="820" y="160" text-anchor="middle" class="sub">还原成人类可读文本</text>
  <path d="M220 155 H268" class="arrow"/>
  <path d="M450 155 H498" class="arrow"/>
  <path d="M680 155 H728" class="arrow"/>
  <text x="480" y="270" text-anchor="middle" class="sub">模型只处理数字表示；Tokenizer 负责在人类语言和 Token ID 之间翻译。</text>
</svg>

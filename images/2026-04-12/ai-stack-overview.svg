<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <defs>
    <style>
      .title { font: 700 26px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 19px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .l1 { fill: #eaf3ff; stroke: #5f95d1; stroke-width: 2; rx: 20; }
      .l2 { fill: #eefaf3; stroke: #71b78d; stroke-width: 2; rx: 20; }
      .l3 { fill: #fff8e8; stroke: #d6b15a; stroke-width: 2; rx: 20; }
      .l4 { fill: #f8fbff; stroke: #93b6dc; stroke-width: 2; rx: 20; }
      .arrow { stroke: #5f8ec0; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f8ec0"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="40" y="46" class="title">AI 技术栈全景图</text>
  <rect x="270" y="80" width="440" height="78" class="l1"/>
  <text x="490" y="116" text-anchor="middle" class="label">Agent Skill</text>
  <text x="490" y="140" text-anchor="middle" class="sub">给 Agent 的操作手册和工作规范</text>
  <rect x="220" y="195" width="540" height="86" class="l2"/>
  <text x="490" y="232" text-anchor="middle" class="label">Agent</text>
  <text x="490" y="258" text-anchor="middle" class="sub">规划步骤、调用工具、根据结果持续推进任务</text>
  <rect x="90" y="330" width="300" height="92" class="l3"/>
  <text x="240" y="368" text-anchor="middle" class="label">Tool / MCP</text>
  <text x="240" y="394" text-anchor="middle" class="sub">连接数据库、搜索、天气、文件系统等外部能力</text>
  <rect x="430" y="330" width="460" height="92" class="l4"/>
  <text x="660" y="368" text-anchor="middle" class="label">LLM + Context Window</text>
  <text x="660" y="394" text-anchor="middle" class="sub">模型在上下文容量内读取信息并完成推理与生成</text>
  <rect x="300" y="458" width="380" height="72" class="l1"/>
  <text x="490" y="490" text-anchor="middle" class="label">Prompt / Token / RAG</text>
  <text x="490" y="514" text-anchor="middle" class="sub">决定输入如何组织、切分与补充</text>
  <path d="M490 158 V193" class="arrow"/>
  <path d="M400 281 C400 310,290 310,240 328" class="arrow"/>
  <path d="M580 281 C580 310,620 310,650 328" class="arrow"/>
  <path d="M650 422 C650 445,560 445,520 456" class="arrow"/>
</svg>

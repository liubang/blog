<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
  <defs>
    <style>
      .title { font: 700 26px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 17px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .box1 { fill: #f7fbff; stroke: #7fa8d8; stroke-width: 2; rx: 18; }
      .box2 { fill: #eefaf3; stroke: #73b78f; stroke-width: 2; rx: 18; }
      .box3 { fill: #fff8e8; stroke: #d8b35f; stroke-width: 2; rx: 18; }
      .arrow { stroke: #5f8ec0; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f8ec0"/>
    </marker>
  </defs>
  <rect width="980" height="360" fill="#ffffff"/>
  <text x="40" y="46" class="title">RAG：只把“最相关的内容”送进模型</text>
  <rect x="40" y="100" width="170" height="120" class="box1"/>
  <text x="125" y="138" text-anchor="middle" class="label">原始文档库</text>
  <text x="125" y="166" text-anchor="middle" class="sub">手册、知识库、FAQ</text>
  <rect x="240" y="100" width="170" height="120" class="box2"/>
  <text x="325" y="138" text-anchor="middle" class="label">切分与建索引</text>
  <text x="325" y="166" text-anchor="middle" class="sub">Chunk + Embedding</text>
  <rect x="440" y="100" width="170" height="120" class="box3"/>
  <text x="525" y="138" text-anchor="middle" class="label">检索最相关片段</text>
  <text x="525" y="166" text-anchor="middle" class="sub">只挑和问题最相关的几段</text>
  <rect x="640" y="100" width="170" height="120" class="box2"/>
  <text x="725" y="138" text-anchor="middle" class="label">组装 Context</text>
  <text x="725" y="166" text-anchor="middle" class="sub">问题 + 相关片段</text>
  <rect x="840" y="100" width="100" height="120" class="box1"/>
  <text x="890" y="138" text-anchor="middle" class="label">LLM</text>
  <text x="890" y="166" text-anchor="middle" class="sub">生成答案</text>
  <path d="M210 160 H238" class="arrow"/>
  <path d="M410 160 H438" class="arrow"/>
  <path d="M610 160 H638" class="arrow"/>
  <path d="M810 160 H838" class="arrow"/>
  <rect x="120" y="255" width="740" height="58" fill="#f9fbfd" stroke="#d5e1ee" stroke-width="1.5" rx="14"/>
  <text x="490" y="291" text-anchor="middle" class="sub">关键收益：避免把整本资料塞进上下文，降低成本，同时绕开上下文长度限制。</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="400" viewBox="0 0 980 400">
  <defs>
    <style>
      .title { font: 700 26px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 18px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .panel { fill: #f8fbff; stroke: #d8e3ef; stroke-width: 2; rx: 20; }
      .box1 { fill: #ffffff; stroke: #7ea8d8; stroke-width: 2; rx: 16; }
      .box2 { fill: #eefaf3; stroke: #72b78e; stroke-width: 2; rx: 16; }
      .box3 { fill: #fff8e8; stroke: #d6b05a; stroke-width: 2; rx: 16; }
      .arrow { stroke: #5f8ec0; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f8ec0"/>
    </marker>
  </defs>
  <rect width="980" height="400" fill="#ffffff"/>
  <text x="40" y="46" class="title">MCP：把“每个平台一套接法”变成“统一标准接一次”</text>
  <rect x="50" y="90" width="390" height="250" class="panel"/>
  <rect x="540" y="90" width="390" height="250" class="panel"/>
  <text x="245" y="125" text-anchor="middle" class="label">没有 MCP</text>
  <text x="735" y="125" text-anchor="middle" class="label">有了 MCP</text>
  <rect x="105" y="165" width="120" height="70" class="box1"/>
  <text x="165" y="206" text-anchor="middle" class="sub">同一个工具</text>
  <rect x="285" y="140" width="110" height="52" class="box3"/>
  <text x="340" y="172" text-anchor="middle" class="sub">OpenAI 规范</text>
  <rect x="285" y="205" width="110" height="52" class="box3"/>
  <text x="340" y="237" text-anchor="middle" class="sub">Anthropic 规范</text>
  <rect x="285" y="270" width="110" height="52" class="box3"/>
  <text x="340" y="302" text-anchor="middle" class="sub">Google 规范</text>
  <path d="M225 200 H283" class="arrow"/>
  <path d="M225 200 C250 200,250 166,283 166" class="arrow"/>
  <path d="M225 200 C250 200,250 296,283 296" class="arrow"/>
  <rect x="595" y="165" width="120" height="70" class="box1"/>
  <text x="655" y="206" text-anchor="middle" class="sub">同一个工具</text>
  <rect x="745" y="165" width="120" height="70" class="box2"/>
  <text x="805" y="206" text-anchor="middle" class="sub">MCP 标准</text>
  <path d="M715 200 H743" class="arrow"/>
  <rect x="655" y="272" width="90" height="44" class="box3"/>
  <rect x="760" y="272" width="90" height="44" class="box3"/>
  <rect x="865" y="272" width="50" height="44" class="box3"/>
  <text x="700" y="300" text-anchor="middle" class="sub">平台 A</text>
  <text x="805" y="300" text-anchor="middle" class="sub">平台 B</text>
  <text x="890" y="300" text-anchor="middle" class="sub">更多</text>
  <path d="M805 235 V270" class="arrow"/>
  <path d="M805 235 C805 255,700 255,700 270" class="arrow"/>
  <path d="M805 235 C805 255,890 255,890 270" class="arrow"/>
</svg>

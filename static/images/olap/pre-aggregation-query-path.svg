<svg xmlns="http://www.w3.org/2000/svg" width="920" height="510" viewBox="0 0 920 510">
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker><marker id="fast" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#34d399"/></marker></defs>
  <rect width="920" height="510" fill="#020617"/><rect width="920" height="510" fill="url(#grid)"/>
  <text x="40" y="38" fill="#fff" font-family="monospace" font-size="17" font-weight="700">预聚合如何减少查询成本</text>
  <text x="40" y="60" fill="#94a3b8" font-family="monospace" font-size="9">Move repeated computation from query time to ingestion or refresh time</text>
  <line x1="460" y1="92" x2="460" y2="458" stroke="#334155"/>
  <g fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"><path d="M230 160V204"/><path d="M230 260V304"/><path d="M230 360V404"/></g>
  <g fill="none" stroke="#34d399" stroke-width="1.8" marker-end="url(#fast)"><path d="M690 160V224"/><path d="M690 280V344"/></g>
  <g font-family="monospace" text-anchor="middle">
    <text x="230" y="108" fill="#fb7185" font-size="12" font-weight="700">直接扫描明细表</text><text x="690" y="108" fill="#34d399" font-size="12" font-weight="700">读取预聚合结果</text>
    <g><rect x="130" y="128" width="200" height="42" rx="6" fill="#0f172a" stroke="#fb7185"/><text x="230" y="154" fill="#fff" font-size="10">Scan 3,000,000,000 rows</text></g>
    <g><rect x="130" y="216" width="200" height="42" rx="6" fill="#0f172a" stroke="#fbbf24"/><text x="230" y="242" fill="#fff" font-size="10">Local Hash Aggregate</text></g>
    <g><rect x="130" y="316" width="200" height="42" rx="6" fill="#0f172a" stroke="#a78bfa"/><text x="230" y="342" fill="#fff" font-size="10">Network Shuffle</text></g>
    <g><rect x="130" y="416" width="200" height="42" rx="6" fill="#0f172a" stroke="#fbbf24"/><text x="230" y="442" fill="#fff" font-size="10">Global Hash Aggregate</text></g>
    <g><rect x="590" y="128" width="200" height="42" rx="6" fill="#0f172a" stroke="#34d399"/><text x="690" y="154" fill="#fff" font-size="10">Scan 3,000 rows</text></g>
    <g><rect x="590" y="236" width="200" height="42" rx="6" fill="#0f172a" stroke="#34d399"/><text x="690" y="262" fill="#fff" font-size="10">Small Roll Up</text></g>
    <g><rect x="590" y="356" width="200" height="42" rx="6" fill="#0f172a" stroke="#34d399"/><text x="690" y="382" fill="#fff" font-size="10">Result</text></g>
    <text x="690" y="438" fill="#94a3b8" font-size="9">IO ↓ · Scan Rows ↓ · Hash Aggregate ↓</text><text x="690" y="458" fill="#94a3b8" font-size="9">Shuffle ↓ · CPU ↓</text>
  </g>
</svg>

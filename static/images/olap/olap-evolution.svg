<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340">
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker></defs>
  <rect width="920" height="340" fill="#020617"/><rect width="920" height="340" fill="url(#grid)"/>
  <text x="40" y="38" fill="#fff" font-family="monospace" font-size="17" font-weight="700">现代 OLAP 预计算机制的演进</text>
  <text x="40" y="60" fill="#94a3b8" font-family="monospace" font-size="9">From explicit multi-dimensional summaries to optimizer-driven reuse</text>

    <g><rect x="38" y="134" width="140" height="80" rx="6" fill="#0f172a" stroke="#22d3ee"/><text x="108" y="164" fill="#fff" font-size="11" font-weight="700">Cube</text><text x="108" y="187" fill="#94a3b8" font-size="8">多维分析空间</text></g>
    <g><rect x="218" y="134" width="140" height="80" rx="6" fill="#0f172a" stroke="#fbbf24"/><text x="288" y="160" fill="#fff" font-size="11" font-weight="700">Aggregate</text><text x="288" y="178" fill="#fff" font-size="11" font-weight="700">Table</text><text x="288" y="198" fill="#94a3b8" font-size="8">保存汇总结果</text></g>
    <g><rect x="398" y="134" width="140" height="80" rx="6" fill="#0f172a" stroke="#a78bfa"/><text x="468" y="164" fill="#fff" font-size="11" font-weight="700">Rollup</text><text x="468" y="187" fill="#94a3b8" font-size="8">基表物化索引</text></g>
    <g><rect x="578" y="134" width="140" height="80" rx="6" fill="#0f172a" stroke="#34d399"/><text x="648" y="160" fill="#fff" font-size="11" font-weight="700">Materialized</text><text x="648" y="178" fill="#fff" font-size="11" font-weight="700">View</text><text x="648" y="198" fill="#94a3b8" font-size="8">SQL 描述预计算</text></g>
    <g><rect x="758" y="134" width="140" height="80" rx="6" fill="#0f172a" stroke="#fb923c"/><text x="828" y="160" fill="#fff" font-size="11" font-weight="700">Cost Based</text><text x="828" y="178" fill="#fff" font-size="11" font-weight="700">Rewrite</text><text x="828" y="198" fill="#94a3b8" font-size="8">自动选择低成本 Plan</text></g>
    <text x="468" y="282" fill="#94a3b8" font-size="9">表达能力增强 → 维护方式更灵活 → 用户感知更少 → 优化器责任更重</text>

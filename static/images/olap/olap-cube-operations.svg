<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#fb923c"/></marker></defs>
  <rect width="920" height="520" fill="#020617"/><rect width="920" height="520" fill="url(#grid)"/>
  <text x="40" y="38" fill="#fff" font-family="monospace" font-size="17" font-weight="700">OLAP Cube 与多维分析操作</text>
  <text x="40" y="60" fill="#94a3b8" font-family="monospace" font-size="9">Observe the same fact from different dimensions and granularities</text>
  <g transform="translate(100 130)" fill="none" stroke="#a78bfa" stroke-width="1.5">
    <path d="M0 70L150 0 300 70 150 140Z"/><path d="M0 70V230L150 300 300 230V70"/><path d="M150 140V300"/>
    <path d="M75 35V265M225 35V265M0 150L150 220 300 150M0 190L150 260 300 190" stroke="#475569"/>
    <path d="M0 110L150 180 300 110" stroke="#fb923c" stroke-width="3"/>
  </g>
  <g font-family="monospace">
    <text x="82" y="458" fill="#94a3b8" font-size="10">时间</text><text x="376" y="458" fill="#94a3b8" font-size="10">地区</text><text x="252" y="108" fill="#94a3b8" font-size="10">商品</text>
    <text x="468" y="124" fill="#fb923c" font-size="11" font-weight="700">SLICE</text><text x="468" y="144" fill="#94a3b8" font-size="9">固定一个维度，例如只看某一天</text>
    <text x="468" y="204" fill="#22d3ee" font-size="11" font-weight="700">DICE</text><text x="468" y="224" fill="#94a3b8" font-size="9">在多个维度筛选一个子空间</text>
    <text x="468" y="284" fill="#34d399" font-size="11" font-weight="700">DRILL DOWN</text><text x="468" y="304" fill="#94a3b8" font-size="9">月 → 日，省 → 市，从粗粒度进入细粒度</text>
    <text x="468" y="364" fill="#a78bfa" font-size="11" font-weight="700">ROLL UP</text><text x="468" y="384" fill="#94a3b8" font-size="9">日 → 月，市 → 省，从细粒度向上聚合</text>
  </g>
  <path d="M744 340V286" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M784 286V340" fill="none" stroke="#64748b" stroke-width="1.8"/>
  <text x="764" y="274" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="8">粒度变化</text>
</svg>

  <g font-family="monospace" text-anchor="middle">
    <g><rect x="62" y="126" width="128" height="72" rx="6" fill="#0f172a" stroke="#22d3ee"/><text x="126" y="154" fill="#fff" font-size="11" font-weight="700">业务 SQL</text><text x="126" y="176" fill="#94a3b8" font-size="8">query base table</text></g>
    <g><rect x="326" y="126" width="126" height="72" rx="6" fill="#0f172a" stroke="#fb923c"/><text x="389" y="154" fill="#fff" font-size="11" font-weight="700">Optimizer</text><text x="389" y="176" fill="#94a3b8" font-size="8">semantic match</text></g>
    <g><rect x="578" y="126" width="150" height="72" rx="6" fill="#0f172a" stroke="#a78bfa"/><text x="653" y="154" fill="#fff" font-size="11" font-weight="700">Candidate Search</text><text x="653" y="176" fill="#94a3b8" font-size="8">base table + MVs</text></g>
    <g><rect x="160" y="318" width="180" height="68" rx="6" fill="#0f172a" stroke="#fb7185"/><text x="250" y="345" fill="#fff" font-size="11" font-weight="700">Base Table Plan</text><text x="250" y="366" fill="#94a3b8" font-size="8">scan billions of rows</text></g>
    <g><rect x="600" y="318" width="180" height="68" rx="6" fill="#0f172a" stroke="#34d399"/><text x="690" y="345" fill="#fff" font-size="11" font-weight="700">MV Plan</text><text x="690" y="366" fill="#94a3b8" font-size="8">scan + small roll up</text></g>

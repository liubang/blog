<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" role="img" aria-labelledby="architecture-title architecture-desc">
  <title id="architecture-title">MiniDFS overall architecture</title>
  <desc id="architecture-desc">MiniDFS has three primary roles: Client asks NameNode for metadata, streams blocks directly to DataNodes, and NameNode persists metadata to MySQL while receiving DataNode heartbeats.</desc>

  <defs>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="40" y="48" fill="white" font-size="22" font-weight="700">MiniDFS Architecture</text>
  <text x="40" y="74" fill="#94a3b8" font-size="12">Control plane: metadata and coordination · Data plane: direct block IO</text>

  <!-- Client -->
  <rect x="50" y="205" width="165" height="135" rx="10" fill="#0f172a"/>
  <rect x="50" y="205" width="165" height="135" rx="10" fill="rgba(8, 51, 68, 0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="132" y="240" fill="white" font-size="17" font-weight="700" text-anchor="middle">DFS Client</text>
  <text x="132" y="265" fill="#94a3b8" font-size="12" text-anchor="middle">CLI / API facade</text>
  <text x="132" y="292" fill="#22d3ee" font-size="12" text-anchor="middle">metadata RPC</text>
  <text x="132" y="314" fill="#22d3ee" font-size="12" text-anchor="middle">block read / write</text>

  <!-- NameNode -->
  <rect x="305" y="95" width="390" height="250" rx="12" fill="#0f172a"/>
  <rect x="305" y="95" width="390" height="250" rx="12" fill="rgba(6, 78, 59, 0.25)" stroke="#34d399" stroke-width="1.5"/>
  <text x="500" y="130" fill="#34d399" font-size="20" font-weight="700" text-anchor="middle">NameNode</text>
  <text x="500" y="154" fill="#94a3b8" font-size="12" text-anchor="middle">metadata center · cluster coordinator</text>

  <rect x="328" y="178" width="104" height="56" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="380" y="201" fill="white" font-size="12" font-weight="600" text-anchor="middle">Namespace</text>
  <text x="380" y="219" fill="#94a3b8" font-size="11" text-anchor="middle">inode tree</text>

  <rect x="448" y="178" width="104" height="56" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="500" y="201" fill="white" font-size="12" font-weight="600" text-anchor="middle">Blocks</text>
  <text x="500" y="219" fill="#94a3b8" font-size="11" text-anchor="middle">alloc / commit</text>

  <rect x="568" y="178" width="104" height="56" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="620" y="201" fill="white" font-size="12" font-weight="600" text-anchor="middle">Leases</text>
  <text x="620" y="219" fill="#94a3b8" font-size="11" text-anchor="middle">write mutex</text>

  <rect x="328" y="248" width="104" height="56" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="380" y="271" fill="white" font-size="12" font-weight="600" text-anchor="middle">DN Health</text>
  <text x="380" y="289" fill="#94a3b8" font-size="11" text-anchor="middle">heartbeat</text>

  <rect x="448" y="248" width="104" height="56" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="500" y="271" fill="white" font-size="12" font-weight="600" text-anchor="middle">Placement</text>
  <text x="500" y="289" fill="#94a3b8" font-size="11" text-anchor="middle">choose DNs</text>

  <rect x="568" y="248" width="104" height="56" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="620" y="271" fill="white" font-size="12" font-weight="600" text-anchor="middle">Replica</text>
  <text x="620" y="289" fill="#94a3b8" font-size="11" text-anchor="middle">repair plan</text>

  <rect x="375" y="318" width="250" height="18" rx="9" fill="rgba(15, 23, 42, 0.6)" stroke="#1e293b" stroke-width="1"/>
  <text x="500" y="331" fill="#94a3b8" font-size="11" text-anchor="middle">returns locations; no file bytes</text>

  <!-- MySQL -->
  <rect x="785" y="125" width="165" height="120" rx="10" fill="#0f172a"/>
  <rect x="785" y="125" width="165" height="120" rx="10" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="868" y="160" fill="white" font-size="18" font-weight="700" text-anchor="middle">MySQL</text>
  <text x="868" y="184" fill="#94a3b8" font-size="12" text-anchor="middle">MetadataStore</text>
  <text x="868" y="210" fill="#a78bfa" font-size="12" text-anchor="middle">inodes · blocks</text>
  <text x="868" y="229" fill="#a78bfa" font-size="12" text-anchor="middle">replicas · leases</text>

  <!-- DataNode cluster -->
  <rect x="290" y="405" width="500" height="120" rx="12" fill="rgba(30, 41, 59, 0.18)" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="315" y="431" fill="#94a3b8" font-size="13" font-weight="600">DataNode cluster</text>

  <rect x="318" y="450" width="130" height="56" rx="8" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="383" y="474" fill="white" font-size="13" font-weight="600" text-anchor="middle">DataNode-1</text>
  <text x="383" y="492" fill="#64748b" font-size="11" text-anchor="middle">LocalBlockStore</text>

  <rect x="475" y="450" width="130" height="56" rx="8" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="540" y="474" fill="white" font-size="13" font-weight="600" text-anchor="middle">DataNode-2</text>
  <text x="540" y="492" fill="#64748b" font-size="11" text-anchor="middle">LocalBlockStore</text>

  <rect x="632" y="450" width="130" height="56" rx="8" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="697" y="474" fill="white" font-size="13" font-weight="600" text-anchor="middle">DataNode-3</text>
  <text x="697" y="492" fill="#64748b" font-size="11" text-anchor="middle">LocalBlockStore</text>

  <!-- Control plane arrows -->
  <line x1="215" y1="245" x2="303" y2="190" stroke="#22d3ee" stroke-width="1.6" marker-end="url(#arrow-cyan)"/>
  <text x="242" y="206" fill="#22d3ee" font-size="12" transform="rotate(-28, 242, 206)">metadata RPC</text>

  <line x1="695" y1="178" x2="783" y2="178" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#arrow-violet)"/>
  <text x="739" y="166" fill="#a78bfa" font-size="12" text-anchor="middle">metadata tx</text>

  <path d="M 390 405 C 390 375, 410 355, 430 345" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrow-slate)"/>
  <path d="M 540 405 C 540 375, 535 360, 525 346" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrow-slate)"/>
  <path d="M 690 405 C 690 375, 642 360, 604 346" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrow-slate)"/>
  <text x="620" y="382" fill="#94a3b8" font-size="12">Heartbeat / BlockReport</text>

  <!-- Data plane arrows -->
  <path d="M 165 340 C 230 420, 265 475, 316 478" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arrow-cyan)"/>
  <text x="190" y="418" fill="#22d3ee" font-size="12" transform="rotate(42, 190, 418)">data stream</text>

  <line x1="448" y1="478" x2="473" y2="478" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="605" y1="478" x2="630" y2="478" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="540" y="548" fill="#fb923c" font-size="13" font-weight="600" text-anchor="middle">Pipeline replication: chunk-by-chunk, ACK returns in reverse</text>

  <!-- Reading guide -->
  <rect x="50" y="560" width="900" height="38" rx="8" fill="rgba(15, 23, 42, 0.6)" stroke="#1e293b" stroke-width="1"/>
  <circle cx="73" cy="579" r="5" fill="#34d399"/>
  <text x="88" y="584" fill="#94a3b8" font-size="12">NameNode decides placement</text>
  <circle cx="313" cy="579" r="5" fill="#22d3ee"/>
  <text x="328" y="584" fill="#94a3b8" font-size="12">Client transfers data directly</text>
  <circle cx="572" cy="579" r="5" fill="#a78bfa"/>
  <text x="587" y="584" fill="#94a3b8" font-size="12">MySQL stores durable metadata</text>
</svg>

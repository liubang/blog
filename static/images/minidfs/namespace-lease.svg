<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 680" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- ================================================================== -->
  <!-- LEFT SIDE: Namespace Tree (Inode hierarchy)                        -->
  <!-- ================================================================== -->

  <!-- Namespace Tree boundary -->
  <rect x="30" y="20" width="440" height="340" rx="10" fill="rgba(6, 78, 59, 0.08)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="50" y="42" fill="#34d399" font-size="11" font-weight="600">Namespace Tree (Inode)</text>

  <!-- Root node / -->
  <rect x="200" y="60" width="100" height="36" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="83" fill="white" font-size="10" font-weight="600" text-anchor="middle">/</text>
  <text x="250" y="56" fill="#94a3b8" font-size="7" text-anchor="middle">inode_id=1</text>

  <!-- Level 1: /data and /tmp -->
  <rect x="100" y="130" width="100" height="36" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="150" y="153" fill="white" font-size="10" font-weight="600" text-anchor="middle">data</text>

  <rect x="300" y="130" width="100" height="36" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="350" y="153" fill="white" font-size="10" font-weight="600" text-anchor="middle">tmp</text>

  <!-- Level 2: /data/logs -->
  <rect x="60" y="200" width="100" height="36" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="110" y="223" fill="white" font-size="10" font-weight="600" text-anchor="middle">logs</text>

  <!-- Level 2: /data/user -->
  <rect x="180" y="200" width="100" height="36" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="230" y="223" fill="white" font-size="10" font-weight="600" text-anchor="middle">user</text>

  <!-- Level 3: /data/logs/app.log (file) -->
  <rect x="50" y="270" width="120" height="36" rx="5" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="110" y="293" fill="white" font-size="9" font-weight="600" text-anchor="middle">app.log</text>
  <text x="110" y="260" fill="#22d3ee" font-size="7" text-anchor="middle">FILE</text>

  <!-- Level 3: /data/user/report.csv (file, under construction) -->
  <rect x="180" y="270" width="130" height="36" rx="5" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="245" y="293" fill="white" font-size="9" font-weight="600" text-anchor="middle">report.csv</text>
  <text x="245" y="260" fill="#fb7185" font-size="7" text-anchor="middle">UNDER_CONSTRUCTION</text>

  <!-- Tree edges -->
  <line x1="250" y1="96" x2="150" y2="130" stroke="#34d399" stroke-width="1"/>
  <line x1="250" y1="96" x2="350" y2="130" stroke="#34d399" stroke-width="1"/>
  <line x1="130" y1="166" x2="110" y2="200" stroke="#34d399" stroke-width="1"/>
  <line x1="170" y1="166" x2="230" y2="200" stroke="#34d399" stroke-width="1"/>
  <line x1="110" y1="236" x2="110" y2="270" stroke="#22d3ee" stroke-width="1"/>
  <line x1="230" y1="236" x2="245" y2="270" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Annotation: parent_id + name -->
  <rect x="330" y="200" width="130" height="50" rx="4" fill="rgba(30, 41, 59, 0.6)" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="340" y="216" fill="#94a3b8" font-size="8">parent_id + name</text>
  <text x="340" y="230" fill="#94a3b8" font-size="8">唯一定位一个 inode</text>
  <text x="340" y="244" fill="#64748b" font-size="7">UNIQUE(parent_id, name)</text>

  <!-- ================================================================== -->
  <!-- RIGHT SIDE: Lease lifecycle                                        -->
  <!-- ================================================================== -->

  <!-- Lease boundary -->
  <rect x="510" y="20" width="440" height="340" rx="10" fill="rgba(136, 19, 55, 0.08)" stroke="#fb7185" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="530" y="42" fill="#fb7185" font-size="11" font-weight="600">Lease Lifecycle</text>

  <!-- State: No Lease -->
  <rect x="660" y="60" width="140" height="40" rx="5" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="730" y="85" fill="white" font-size="10" font-weight="600" text-anchor="middle">No Lease</text>

  <!-- State: Active -->
  <rect x="660" y="150" width="140" height="40" rx="5" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="730" y="175" fill="white" font-size="10" font-weight="600" text-anchor="middle">Active</text>

  <!-- State: Closed -->
  <rect x="550" y="270" width="120" height="40" rx="5" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="610" y="295" fill="white" font-size="10" font-weight="600" text-anchor="middle">Closed</text>

  <!-- State: Expired -->
  <rect x="790" y="270" width="120" height="40" rx="5" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="850" y="295" fill="white" font-size="10" font-weight="600" text-anchor="middle">Expired</text>

  <!-- Arrows: No Lease → Active -->
  <line x1="730" y1="100" x2="730" y2="148" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <text x="740" y="130" fill="#fb7185" font-size="8">acquire_lease()</text>

  <!-- Arrow: Active → Active (renew, loop) -->
  <path d="M 800 155 C 840 155, 840 185, 800 185" fill="none" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arrow-rose)"/>
  <text x="845" y="173" fill="#fb7185" font-size="8">renew_lease()</text>

  <!-- Arrow: Active → Closed -->
  <line x1="690" y1="190" x2="630" y2="268" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="610" y="235" fill="#a78bfa" font-size="8">release_lease()</text>

  <!-- Arrow: Active → Expired -->
  <line x1="770" y1="190" x2="830" y2="268" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="815" y="235" fill="#fbbf24" font-size="8">timeout (60s)</text>

  <!-- Timing annotation -->
  <rect x="530" y="155" width="115" height="40" rx="4" fill="rgba(30, 41, 59, 0.6)" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="540" y="171" fill="#94a3b8" font-size="8">expire = now + 60s</text>
  <text x="540" y="185" fill="#64748b" font-size="7">renew interval: 30s</text>

  <!-- ================================================================== -->
  <!-- BOTTOM: NamespaceManager + LeaseManager → MetadataStore → MySQL    -->
  <!-- ================================================================== -->

  <!-- Manager layer -->
  <rect x="30" y="400" width="920" height="70" rx="8" fill="rgba(6, 78, 59, 0.12)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="50" y="420" fill="#34d399" font-size="10" font-weight="600">NameNode Manager Layer</text>

  <rect x="60" y="430" width="160" height="32" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="140" y="451" fill="white" font-size="9" font-weight="600" text-anchor="middle">NamespaceManager</text>

  <rect x="240" y="430" width="140" height="32" rx="5" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="310" y="451" fill="white" font-size="9" font-weight="600" text-anchor="middle">LeaseManager</text>

  <rect x="400" y="430" width="140" height="32" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="470" y="451" fill="white" font-size="9" font-weight="600" text-anchor="middle">BlockManager</text>

  <rect x="560" y="430" width="140" height="32" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="630" y="451" fill="white" font-size="9" font-weight="600" text-anchor="middle">DataNodeManager</text>

  <rect x="720" y="430" width="160" height="32" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="800" y="451" fill="white" font-size="9" font-weight="600" text-anchor="middle">ReplicationManager</text>

  <!-- MetadataStore interface -->
  <rect x="280" y="510" width="400" height="40" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="480" y="535" fill="white" font-size="11" font-weight="600" text-anchor="middle">MetadataStore (interface)</text>

  <!-- Arrow: Manager layer → MetadataStore -->
  <line x1="480" y1="470" x2="480" y2="508" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- MySQL -->
  <rect x="340" y="590" width="280" height="44" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="480" y="616" fill="white" font-size="11" font-weight="600" text-anchor="middle">MySQL 8.0 (InnoDB)</text>

  <!-- Arrow: MetadataStore → MySQL -->
  <line x1="480" y1="550" x2="480" y2="588" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- MySQL tables annotation -->
  <rect x="650" y="580" width="170" height="60" rx="4" fill="rgba(30, 41, 59, 0.6)" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="660" y="596" fill="#a78bfa" font-size="8" font-weight="600">Tables:</text>
  <text x="660" y="610" fill="#94a3b8" font-size="8">inodes (parent_id, name)</text>
  <text x="660" y="624" fill="#94a3b8" font-size="8">leases (inode_id, state)</text>
  <text x="660" y="638" fill="#94a3b8" font-size="8">blocks, replicas, ...</text>

  <!-- Walk path annotation -->
  <rect x="60" y="510" width="190" height="50" rx="4" fill="rgba(30, 41, 59, 0.6)" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="70" y="526" fill="#22d3ee" font-size="8" font-weight="600">Path Resolution:</text>
  <text x="70" y="540" fill="#94a3b8" font-size="8">split("/a/b/c") → [a, b, c]</text>
  <text x="70" y="554" fill="#94a3b8" font-size="8">walk: root→a→b→c (O(depth))</text>

  <!-- Legend -->
  <rect x="30" y="650" width="920" height="24" rx="4" fill="rgba(30, 41, 59, 0.3)" stroke="#475569" stroke-width="0.5"/>
  <circle cx="55" cy="662" r="4" fill="#34d399"/>
  <text x="65" y="666" fill="#94a3b8" font-size="8">Directory</text>
  <circle cx="145" cy="662" r="4" fill="#22d3ee"/>
  <text x="155" y="666" fill="#94a3b8" font-size="8">File (Normal)</text>
  <circle cx="255" cy="662" r="4" fill="#fb7185"/>
  <text x="265" y="666" fill="#94a3b8" font-size="8">File (UnderConstruction) / Lease</text>
  <circle cx="435" cy="662" r="4" fill="#a78bfa"/>
  <text x="445" y="666" fill="#94a3b8" font-size="8">Storage (MySQL)</text>
  <circle cx="555" cy="662" r="4" fill="#fbbf24"/>
  <text x="565" y="666" fill="#94a3b8" font-size="8">Timeout/Expiry</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace">
  <defs>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="440" y="28" fill="white" font-size="11" font-weight="700" text-anchor="middle">Fault Tolerance: DN Failure → Auto Recovery</text>

  <!-- ================================================================== -->
  <!-- LEFT: Actors column (x=40, width=100)                               -->
  <!-- ================================================================== -->

  <rect x="40" y="60" width="100" height="34" rx="5" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="90" y="78" fill="white" font-size="8" font-weight="600" text-anchor="middle">DataNode-2</text>
  <text x="90" y="90" fill="#fb7185" font-size="6" text-anchor="middle">disk failure</text>

  <rect x="40" y="120" width="100" height="34" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="138" fill="white" font-size="8" font-weight="600" text-anchor="middle">NameNode</text>
  <text x="90" y="150" fill="#94a3b8" font-size="6" text-anchor="middle">control plane</text>

  <rect x="40" y="180" width="100" height="34" rx="5" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="90" y="198" fill="white" font-size="8" font-weight="600" text-anchor="middle">DataNode-1</text>
  <text x="90" y="210" fill="#94a3b8" font-size="6" text-anchor="middle">copy source</text>

  <rect x="40" y="240" width="100" height="34" rx="5" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="90" y="258" fill="white" font-size="8" font-weight="600" text-anchor="middle">DataNode-4</text>
  <text x="90" y="270" fill="#94a3b8" font-size="6" text-anchor="middle">new replica</text>

  <!-- ================================================================== -->
  <!-- Timeline axis: x=160 to x=840 (680px span, 5 points)               -->
  <!-- Points at: 195, 330, 500, 660, 810                                 -->
  <!-- ================================================================== -->
  <line x1="160" y1="46" x2="840" y2="46" stroke="#475569" stroke-width="1"/>

  <line x1="195" y1="42" x2="195" y2="50" stroke="#fb7185" stroke-width="1.5"/>
  <text x="195" y="39" fill="#fb7185" font-size="7" text-anchor="middle">T+0</text>

  <line x1="330" y1="42" x2="330" y2="50" stroke="#fb923c" stroke-width="1.5"/>
  <text x="330" y="39" fill="#fb923c" font-size="7" text-anchor="middle">T+30s</text>

  <line x1="500" y1="42" x2="500" y2="50" stroke="#fb7185" stroke-width="1.5"/>
  <text x="500" y="39" fill="#fb7185" font-size="7" text-anchor="middle">T+600s</text>

  <line x1="660" y1="42" x2="660" y2="50" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="660" y="39" fill="#a78bfa" font-size="7" text-anchor="middle">T+603s</text>

  <line x1="810" y1="42" x2="810" y2="50" stroke="#34d399" stroke-width="1.5"/>
  <text x="810" y="39" fill="#34d399" font-size="7" text-anchor="middle">T+606s</text>

  <!-- ================================================================== -->
  <!-- Swim lane lines                                                     -->
  <!-- ================================================================== -->
  <line x1="160" y1="77" x2="840" y2="77" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="160" y1="137" x2="840" y2="137" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="160" y1="197" x2="840" y2="197" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="160" y1="257" x2="840" y2="257" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- ================================================================== -->
  <!-- T+0: DN-2 crash                                                     -->
  <!-- ================================================================== -->
  <text x="195" y="73" fill="#fb7185" font-size="8" text-anchor="middle">✗</text>
  <text x="195" y="90" fill="#64748b" font-size="6" text-anchor="middle">heartbeat stops</text>

  <line x1="195" y1="95" x2="195" y2="130" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="215" y="116" fill="#fb7185" font-size="5.5">no heartbeat</text>

  <!-- ================================================================== -->
  <!-- T+30s: Mark Stale                                                   -->
  <!-- ================================================================== -->
  <rect x="290" y="122" width="80" height="30" rx="4" fill="rgba(251, 146, 60, 0.25)" stroke="#fb923c" stroke-width="1"/>
  <text x="330" y="137" fill="#fb923c" font-size="7" text-anchor="middle">Mark Stale</text>
  <text x="330" y="148" fill="#94a3b8" font-size="5.5" text-anchor="middle">skip placement</text>

  <!-- ================================================================== -->
  <!-- T+600s: Mark Dead + Scan                                            -->
  <!-- ================================================================== -->
  <rect x="458" y="122" width="84" height="30" rx="4" fill="rgba(136, 19, 55, 0.25)" stroke="#fb7185" stroke-width="1"/>
  <text x="500" y="137" fill="#fb7185" font-size="7" text-anchor="middle">Mark Dead</text>
  <text x="500" y="148" fill="#94a3b8" font-size="5.5" text-anchor="middle">replicas → Lost</text>

  <rect x="458" y="162" width="84" height="24" rx="3" fill="rgba(76, 29, 149, 0.2)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="500" y="175" fill="#a78bfa" font-size="6" text-anchor="middle">Scan: deficit=1</text>
  <text x="500" y="183" fill="#94a3b8" font-size="5" text-anchor="middle">target → DN-4</text>

  <!-- ================================================================== -->
  <!-- T+603s: Command via Heartbeat                                       -->
  <!-- ================================================================== -->

  <!-- DN-1 heartbeat up to NN -->
  <line x1="650" y1="192" x2="650" y2="152" stroke="#34d399" stroke-width="1" marker-end="url(#arrow-emerald)"/>
  <text x="636" y="170" fill="#34d399" font-size="5.5">heartbeat</text>

  <!-- NN responds with REPLICATE command down to DN-1 -->
  <line x1="670" y1="152" x2="670" y2="192" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-violet)"/>
  <text x="686" y="168" fill="#a78bfa" font-size="5.5">cmd: REPLICATE</text>
  <text x="686" y="178" fill="#94a3b8" font-size="5">blk-7 → DN-4</text>

  <!-- ================================================================== -->
  <!-- T+606s: DN-1 copies block to DN-4                                   -->
  <!-- ================================================================== -->

  <!-- DN-1 reads local block -->
  <rect x="775" y="185" width="66" height="24" rx="3" fill="rgba(8, 51, 68, 0.3)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="808" y="200" fill="#22d3ee" font-size="6" text-anchor="middle">read blk-7</text>

  <!-- Arrow: DN-1 → DN-4 (TransferBlock) -->
  <line x1="808" y1="209" x2="808" y2="246" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="822" y="230" fill="#34d399" font-size="5.5">Transfer</text>

  <!-- DN-4 finalize -->
  <rect x="775" y="247" width="66" height="24" rx="3" fill="rgba(6, 78, 59, 0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="808" y="262" fill="#34d399" font-size="6" text-anchor="middle">finalize</text>

  <!-- ================================================================== -->
  <!-- BOTTOM: Before vs After (symmetric layout)                          -->
  <!-- Outer container: x=40 to x=840, total=800                          -->
  <!-- Two boxes: each 388px wide, 12px gap between                        -->
  <!-- Left: x=40..428, Right: x=452..840                                  -->
  <!-- ================================================================== -->

  <!-- Before box -->
  <rect x="40" y="296" width="388" height="110" rx="8" fill="rgba(136, 19, 55, 0.08)" stroke="#fb7185" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="60" y="316" fill="#fb7185" font-size="8" font-weight="600">Before: block-7 replicas (after DN-2 crash)</text>

  <!-- 3 boxes inside: evenly spaced within x=60..408 (348px)             -->
  <!-- box_w=100, total_boxes=300, gaps=2, gap=(348-300)/2=24              -->
  <rect x="60" y="330" width="100" height="28" rx="4" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="110" y="348" fill="white" font-size="7" text-anchor="middle">DN-1 ✓</text>

  <rect x="184" y="330" width="100" height="28" rx="4" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="234" y="344" fill="#fb7185" font-size="7" text-anchor="middle">DN-2 ✗</text>
  <text x="234" y="355" fill="#fb7185" font-size="5.5" text-anchor="middle">Lost</text>

  <rect x="308" y="330" width="100" height="28" rx="4" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="358" y="348" fill="white" font-size="7" text-anchor="middle">DN-3 ✓</text>

  <text x="234" y="383" fill="#fb923c" font-size="7" text-anchor="middle">healthy = 2 / desired = 3 → under-replicated</text>

  <!-- After box -->
  <rect x="452" y="296" width="388" height="110" rx="8" fill="rgba(6, 78, 59, 0.08)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="472" y="316" fill="#34d399" font-size="8" font-weight="600">After: block-7 replicas (recovery complete)</text>

  <!-- 3 boxes inside: evenly spaced within x=472..820 (348px)            -->
  <rect x="472" y="330" width="100" height="28" rx="4" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="522" y="348" fill="white" font-size="7" text-anchor="middle">DN-1 ✓</text>

  <rect x="596" y="330" width="100" height="28" rx="4" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="646" y="348" fill="white" font-size="7" text-anchor="middle">DN-3 ✓</text>

  <rect x="720" y="330" width="100" height="28" rx="4" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="770" y="344" fill="white" font-size="7" text-anchor="middle">DN-4 ✓</text>
  <text x="770" y="355" fill="#a78bfa" font-size="5.5" text-anchor="middle">New</text>

  <text x="646" y="383" fill="#34d399" font-size="7" text-anchor="middle">healthy = 3 / desired = 3 → fully replicated ✓</text>

  <!-- ================================================================== -->
  <!-- Bottom annotation                                                   -->
  <!-- ================================================================== -->
  <text x="440" y="428" fill="#64748b" font-size="6.5" text-anchor="middle">Total recovery time ≈ 10 min (dominated by DeadTimeout=600s) · No manual intervention required</text>
</svg>

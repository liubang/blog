<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 620" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" role="img" aria-labelledby="write-title write-desc">
  <title id="write-title">MiniDFS write pipeline overview</title>
  <desc id="write-desc">A MiniDFS write goes through five phases: create file, allocate block, stream chunks through the DataNode pipeline, commit the block, and complete the file.</desc>

  <defs>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="40" y="48" fill="white" font-size="22" font-weight="700">Write Pipeline Overview</text>
  <text x="40" y="74" fill="#94a3b8" font-size="12">One file write: metadata coordination first, data transfer through the DataNode chain, final metadata commit last.</text>

  <!-- Five phases -->
  <g>
    <rect x="40" y="105" width="180" height="95" rx="9" fill="rgba(6, 78, 59, 0.28)" stroke="#34d399" stroke-width="1.4"/>
    <circle cx="66" cy="132" r="15" fill="rgba(6, 78, 59, 0.55)" stroke="#34d399" stroke-width="1"/>
    <text x="66" y="137" fill="white" font-size="14" font-weight="700" text-anchor="middle">1</text>
    <text x="90" y="132" fill="white" font-size="15" font-weight="700">CreateFile</text>
    <text x="60" y="162" fill="#94a3b8" font-size="12">create inode</text>
    <text x="60" y="181" fill="#94a3b8" font-size="12">acquire lease</text>

    <line x1="220" y1="152" x2="238" y2="152" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-slate)"/>

    <rect x="250" y="105" width="180" height="95" rx="9" fill="rgba(6, 78, 59, 0.28)" stroke="#34d399" stroke-width="1.4"/>
    <circle cx="276" cy="132" r="15" fill="rgba(6, 78, 59, 0.55)" stroke="#34d399" stroke-width="1"/>
    <text x="276" y="137" fill="white" font-size="14" font-weight="700" text-anchor="middle">2</text>
    <text x="300" y="132" fill="white" font-size="15" font-weight="700">AllocateBlock</text>
    <text x="270" y="162" fill="#94a3b8" font-size="12">choose replicas</text>
    <text x="270" y="181" fill="#94a3b8" font-size="12">return locations</text>

    <line x1="430" y1="152" x2="448" y2="152" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-slate)"/>

    <rect x="460" y="105" width="180" height="95" rx="9" fill="rgba(8, 51, 68, 0.42)" stroke="#22d3ee" stroke-width="1.4"/>
    <circle cx="486" cy="132" r="15" fill="rgba(8, 51, 68, 0.7)" stroke="#22d3ee" stroke-width="1"/>
    <text x="486" y="137" fill="white" font-size="14" font-weight="700" text-anchor="middle">3</text>
    <text x="510" y="132" fill="white" font-size="15" font-weight="700">Pipeline Write</text>
    <text x="480" y="162" fill="#94a3b8" font-size="12">send chunks</text>
    <text x="480" y="181" fill="#94a3b8" font-size="12">wait reverse ACK</text>

    <line x1="640" y1="152" x2="658" y2="152" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-slate)"/>

    <rect x="670" y="105" width="165" height="95" rx="9" fill="rgba(6, 78, 59, 0.28)" stroke="#34d399" stroke-width="1.4"/>
    <circle cx="696" cy="132" r="15" fill="rgba(6, 78, 59, 0.55)" stroke="#34d399" stroke-width="1"/>
    <text x="696" y="137" fill="white" font-size="14" font-weight="700" text-anchor="middle">4</text>
    <text x="720" y="132" fill="white" font-size="15" font-weight="700">CommitBlock</text>
    <text x="690" y="162" fill="#94a3b8" font-size="12">mark block</text>
    <text x="690" y="181" fill="#94a3b8" font-size="12">finalized</text>

    <line x1="835" y1="152" x2="853" y2="152" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-slate)"/>

    <rect x="865" y="105" width="155" height="95" rx="9" fill="rgba(6, 78, 59, 0.28)" stroke="#34d399" stroke-width="1.4"/>
    <circle cx="891" cy="132" r="15" fill="rgba(6, 78, 59, 0.55)" stroke="#34d399" stroke-width="1"/>
    <text x="891" y="137" fill="white" font-size="14" font-weight="700" text-anchor="middle">5</text>
    <text x="915" y="132" fill="white" font-size="15" font-weight="700">CompleteFile</text>
    <text x="885" y="162" fill="#94a3b8" font-size="12">release lease</text>
    <text x="885" y="181" fill="#94a3b8" font-size="12">file visible</text>
  </g>

  <!-- Metadata coordination -->
  <rect x="50" y="240" width="960" height="105" rx="12" fill="rgba(6, 78, 59, 0.12)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="70" y="266" fill="#34d399" font-size="14" font-weight="700">Metadata coordination</text>

  <rect x="105" y="286" width="150" height="40" rx="7" fill="rgba(8, 51, 68, 0.45)" stroke="#22d3ee" stroke-width="1.4"/>
  <text x="180" y="311" fill="white" font-size="13" font-weight="600" text-anchor="middle">Client</text>

  <rect x="455" y="286" width="150" height="40" rx="7" fill="rgba(6, 78, 59, 0.45)" stroke="#34d399" stroke-width="1.4"/>
  <text x="530" y="311" fill="white" font-size="13" font-weight="600" text-anchor="middle">NameNode</text>

  <rect x="805" y="286" width="150" height="40" rx="7" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.4"/>
  <text x="880" y="311" fill="white" font-size="13" font-weight="600" text-anchor="middle">MySQL</text>

  <line x1="255" y1="306" x2="453" y2="306" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="354" y="295" fill="#34d399" font-size="12" text-anchor="middle">metadata RPCs</text>

  <line x1="605" y1="306" x2="803" y2="306" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="704" y="295" fill="#a78bfa" font-size="12" text-anchor="middle">inode + block metadata tx</text>

  <!-- Data pipeline -->
  <rect x="50" y="375" width="960" height="150" rx="12" fill="rgba(8, 51, 68, 0.08)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="70" y="401" fill="#22d3ee" font-size="14" font-weight="700">Data pipeline</text>

  <rect x="85" y="432" width="125" height="48" rx="7" fill="rgba(8, 51, 68, 0.45)" stroke="#22d3ee" stroke-width="1.4"/>
  <text x="148" y="453" fill="white" font-size="13" font-weight="600" text-anchor="middle">Client</text>
  <text x="148" y="470" fill="#94a3b8" font-size="11" text-anchor="middle">chunk + CRC</text>

  <rect x="300" y="425" width="140" height="62" rx="7" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="370" y="450" fill="white" font-size="13" font-weight="600" text-anchor="middle">DataNode-1</text>
  <text x="370" y="469" fill="#94a3b8" font-size="11" text-anchor="middle">append + forward</text>

  <rect x="530" y="425" width="140" height="62" rx="7" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="600" y="450" fill="white" font-size="13" font-weight="600" text-anchor="middle">DataNode-2</text>
  <text x="600" y="469" fill="#94a3b8" font-size="11" text-anchor="middle">append + forward</text>

  <rect x="760" y="425" width="140" height="62" rx="7" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="830" y="450" fill="white" font-size="13" font-weight="600" text-anchor="middle">DataNode-3</text>
  <text x="830" y="469" fill="#94a3b8" font-size="11" text-anchor="middle">tail finalize</text>

  <line x1="210" y1="452" x2="298" y2="452" stroke="#22d3ee" stroke-width="1.6" marker-end="url(#arrow-cyan)"/>
  <text x="254" y="440" fill="#22d3ee" font-size="12" text-anchor="middle">WriteBlock</text>

  <line x1="440" y1="452" x2="528" y2="452" stroke="#22d3ee" stroke-width="1.6" marker-end="url(#arrow-cyan)"/>
  <text x="484" y="440" fill="#22d3ee" font-size="12" text-anchor="middle">forward</text>

  <line x1="670" y1="452" x2="758" y2="452" stroke="#22d3ee" stroke-width="1.6" marker-end="url(#arrow-cyan)"/>
  <text x="714" y="440" fill="#22d3ee" font-size="12" text-anchor="middle">forward</text>

  <path d="M 760 478 C 670 510, 300 510, 210 478" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-orange)"/>
  <text x="485" y="510" fill="#fb923c" font-size="12" font-weight="600" text-anchor="middle">ACK returns: DN3 → DN2 → DN1 → Client</text>

  <!-- Reading guide -->
  <rect x="50" y="555" width="960" height="42" rx="8" fill="rgba(15, 23, 42, 0.6)" stroke="#1e293b" stroke-width="1"/>
  <circle cx="76" cy="576" r="5" fill="#34d399"/>
  <text x="92" y="581" fill="#94a3b8" font-size="12">NameNode controls metadata</text>
  <circle cx="332" cy="576" r="5" fill="#22d3ee"/>
  <text x="348" y="581" fill="#94a3b8" font-size="12">Data bytes bypass NameNode</text>
  <circle cx="605" cy="576" r="5" fill="#fb923c"/>
  <text x="621" y="581" fill="#94a3b8" font-size="12">Client advances after pipeline ACK</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace">
  <defs>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- ================================================================== -->
  <!-- TOP SECTION: DataNode ↔ NameNode interaction                        -->
  <!-- ================================================================== -->

  <!-- DataNode boundary (left) -->
  <rect x="30" y="20" width="370" height="210" rx="8" fill="rgba(8, 51, 68, 0.1)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="50" y="40" fill="#22d3ee" font-size="9" font-weight="600">DataNode</text>

  <!-- NameNode boundary (right) -->
  <rect x="500" y="20" width="370" height="210" rx="8" fill="rgba(6, 78, 59, 0.1)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="520" y="40" fill="#34d399" font-size="9" font-weight="600">NameNode</text>

  <!-- DN: HeartbeatSender -->
  <rect x="50" y="52" width="160" height="40" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="130" y="70" fill="white" font-size="8" font-weight="600" text-anchor="middle">HeartbeatSender</text>
  <text x="130" y="84" fill="#94a3b8" font-size="7" text-anchor="middle">every 3s</text>

  <!-- DN: BlockReporter -->
  <rect x="50" y="106" width="160" height="40" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="130" y="124" fill="white" font-size="8" font-weight="600" text-anchor="middle">BlockReporter</text>
  <text x="130" y="138" fill="#94a3b8" font-size="7" text-anchor="middle">every 10min</text>

  <!-- DN: LocalBlockStore -->
  <rect x="50" y="162" width="160" height="40" rx="5" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="130" y="180" fill="white" font-size="8" font-weight="600" text-anchor="middle">LocalBlockStore</text>
  <text x="130" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">tmp/ → current/</text>

  <!-- DN: ReplicationWorker -->
  <rect x="230" y="162" width="150" height="40" rx="5" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="305" y="180" fill="white" font-size="8" font-weight="600" text-anchor="middle">ReplicationWorker</text>
  <text x="305" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">exec commands</text>

  <!-- NN: DataNodeManager -->
  <rect x="530" y="52" width="310" height="40" rx="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="685" y="70" fill="white" font-size="8" font-weight="600" text-anchor="middle">DataNodeManager</text>
  <text x="685" y="84" fill="#94a3b8" font-size="7" text-anchor="middle">state: Live / Stale / Dead</text>

  <!-- NN: BlockManager -->
  <rect x="530" y="106" width="310" height="40" rx="5" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="685" y="124" fill="white" font-size="8" font-weight="600" text-anchor="middle">BlockManager</text>
  <text x="685" y="138" fill="#94a3b8" font-size="7" text-anchor="middle">reconcile replicas</text>

  <!-- NN: Command Generator -->
  <rect x="530" y="162" width="310" height="40" rx="5" fill="rgba(136, 19, 55, 0.2)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="685" y="180" fill="white" font-size="8" font-weight="600" text-anchor="middle">Command Generator</text>
  <text x="685" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Replicate / Delete</text>

  <!-- Arrows: DN ↔ NN -->
  <line x1="210" y1="72" x2="528" y2="72" stroke="#34d399" stroke-width="1.3" marker-end="url(#arrow-emerald)"/>
  <text x="370" y="65" fill="#34d399" font-size="7.5" text-anchor="middle">heartbeat: capacity / used / free</text>

  <line x1="210" y1="126" x2="528" y2="126" stroke="#fb923c" stroke-width="1.3" marker-end="url(#arrow-orange)"/>
  <text x="370" y="119" fill="#fb923c" font-size="7.5" text-anchor="middle">block report: [{block_id, gs, len}]</text>

  <line x1="528" y1="182" x2="382" y2="182" stroke="#fb7185" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-rose)"/>
  <text x="455" y="175" fill="#fb7185" font-size="7.5" text-anchor="middle">commands (via heartbeat response)</text>

  <!-- ================================================================== -->
  <!-- BOTTOM LEFT: Block File Format                                      -->
  <!-- ================================================================== -->

  <rect x="30" y="255" width="400" height="240" rx="8" fill="rgba(76, 29, 149, 0.06)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="50" y="278" fill="#a78bfa" font-size="9" font-weight="600">Block File: blk_&lt;id&gt;_&lt;gs&gt;.blk</text>

  <!-- Header bar -->
  <rect x="50" y="294" width="360" height="30" rx="4" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="230" y="314" fill="white" font-size="8" font-weight="600" text-anchor="middle">BlockHeader (packed struct, fixed size)</text>

  <!-- Header fields -->
  <rect x="50" y="338" width="360" height="42" rx="3" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="0.6"/>
  <text x="60" y="356" fill="#a78bfa" font-size="7">magic | version | block_id | inode_id | generation_stamp</text>
  <text x="60" y="372" fill="#94a3b8" font-size="7">chunk_count | chunk_offsets[256] | chunk_checksums[256] | block_crc</text>

  <!-- Chunk bars (aligned: left=50, right=410, total width=360) -->
  <!-- 3 chunks + 2 gaps + dots: chunk_w=100, gap=15, dots_w=15 -->
  <rect x="50" y="398" width="100" height="26" rx="3" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="100" y="415" fill="#22d3ee" font-size="7" text-anchor="middle">Chunk 0</text>

  <rect x="165" y="398" width="100" height="26" rx="3" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="215" y="415" fill="#22d3ee" font-size="7" text-anchor="middle">Chunk 1</text>

  <text x="287" y="415" fill="#64748b" font-size="9" text-anchor="middle">...</text>

  <rect x="310" y="398" width="100" height="26" rx="3" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="360" y="415" fill="#22d3ee" font-size="7" text-anchor="middle">Chunk N</text>

  <!-- Lifecycle (aligned: left=50, right=410) -->
  <text x="50" y="450" fill="#94a3b8" font-size="7.5" font-weight="600">Lifecycle:</text>

  <rect x="50" y="460" width="66" height="22" rx="3" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="83" y="475" fill="#fb7185" font-size="7" text-anchor="middle">tmp/</text>

  <text x="124" y="475" fill="#34d399" font-size="10">→</text>

  <rect x="140" y="460" width="86" height="22" rx="3" fill="rgba(6, 78, 59, 0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="183" y="475" fill="#34d399" font-size="7" text-anchor="middle">current/</text>

  <text x="234" y="475" fill="#fb923c" font-size="10">→</text>

  <rect x="250" y="460" width="66" height="22" rx="3" fill="rgba(30, 41, 59, 0.4)" stroke="#64748b" stroke-width="0.8"/>
  <text x="283" y="475" fill="#64748b" font-size="7" text-anchor="middle">trash/</text>

  <text x="324" y="475" fill="#64748b" font-size="10">→</text>

  <rect x="340" y="460" width="70" height="22" rx="3" fill="rgba(30, 41, 59, 0.2)" stroke="#475569" stroke-width="0.6"/>
  <text x="375" y="475" fill="#475569" font-size="7" text-anchor="middle">purge</text>

  <!-- ================================================================== -->
  <!-- BOTTOM RIGHT: State Machine                                         -->
  <!-- ================================================================== -->

  <rect x="460" y="255" width="410" height="240" rx="8" fill="rgba(6, 78, 59, 0.06)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="480" y="278" fill="#34d399" font-size="9" font-weight="600">DataNode State Machine (NameNode side)</text>

  <!-- Recovery arc text -->
  <text x="600" y="298" fill="#34d399" font-size="6">heartbeat received → Live</text>

  <!-- Live (left-aligned with Timing box at x=490) -->
  <rect x="490" y="330" width="82" height="42" rx="5" fill="rgba(6, 78, 59, 0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="531" y="352" fill="white" font-size="9" font-weight="600" text-anchor="middle">Live</text>
  <text x="531" y="366" fill="#94a3b8" font-size="6" text-anchor="middle">placement OK</text>

  <!-- Stale (centered) -->
  <rect x="630" y="330" width="82" height="42" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="671" y="352" fill="white" font-size="9" font-weight="600" text-anchor="middle">Stale</text>
  <text x="671" y="366" fill="#94a3b8" font-size="6" text-anchor="middle">no placement</text>

  <!-- Dead (right-aligned with Timing box end at x=850) -->
  <rect x="768" y="330" width="82" height="42" rx="5" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="809" y="352" fill="white" font-size="9" font-weight="600" text-anchor="middle">Dead</text>
  <text x="809" y="366" fill="#94a3b8" font-size="6" text-anchor="middle">re-replicate</text>

  <!-- Arrows: Live → Stale → Dead -->
  <line x1="572" y1="351" x2="628" y2="351" stroke="#fb923c" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <text x="598" y="343" fill="#fb923c" font-size="7">30s</text>

  <line x1="712" y1="351" x2="766" y2="351" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arrow-rose)"/>
  <text x="737" y="343" fill="#fb7185" font-size="7">600s</text>

  <!-- Recovery arc: Stale → Live (flat arc) -->
  <path d="M 630 330 Q 600 308 565 308 Q 540 308 531 328" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-emerald)"/>

  <!-- Timing box -->
  <rect x="490" y="392" width="360" height="88" rx="4" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="0.6"/>
  <text x="510" y="410" fill="#fbbf24" font-size="7.5" font-weight="600">Timing Constants:</text>

  <text x="510" y="428" fill="#94a3b8" font-size="7">HeartbeatInterval   = 3s</text>
  <text x="510" y="444" fill="#94a3b8" font-size="7">StaleTimeout        = 30s</text>
  <text x="510" y="460" fill="#94a3b8" font-size="7">DeadTimeout         = 600s</text>
  <text x="510" y="476" fill="#94a3b8" font-size="7">BlockReportInterval = 10min</text>

  <text x="720" y="428" fill="#64748b" font-size="6.5">Stale: skip placement</text>
  <text x="720" y="444" fill="#64748b" font-size="6.5">Dead: replicas marked lost</text>
  <text x="720" y="460" fill="#64748b" font-size="6.5">trigger re-replication</text>

  <!-- ================================================================== -->
  <!-- Legend                                                               -->
  <!-- ================================================================== -->

  <rect x="30" y="510" width="840" height="20" rx="3" fill="rgba(30, 41, 59, 0.3)" stroke="#475569" stroke-width="0.5"/>
  <circle cx="55" cy="520" r="3" fill="#34d399"/>
  <text x="63" y="524" fill="#94a3b8" font-size="7">Heartbeat</text>
  <circle cx="145" cy="520" r="3" fill="#fb923c"/>
  <text x="153" y="524" fill="#94a3b8" font-size="7">Block Report</text>
  <circle cx="250" cy="520" r="3" fill="#fb7185"/>
  <text x="258" y="524" fill="#94a3b8" font-size="7">Commands</text>
  <circle cx="345" cy="520" r="3" fill="#a78bfa"/>
  <text x="353" y="524" fill="#94a3b8" font-size="7">Storage</text>
  <circle cx="420" cy="520" r="3" fill="#22d3ee"/>
  <text x="428" y="524" fill="#94a3b8" font-size="7">Data</text>
</svg>

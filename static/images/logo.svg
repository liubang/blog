<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>

  <!-- 终端窗口 -->
  <g filter="url(#shadow)">
    <!-- 窗口主体 -->
    <rect x="106" y="130" width="300" height="220" rx="12" fill="url(#termGrad)" stroke="#2d3748" stroke-width="1.5"/>
    <!-- 标题栏 -->
    <rect x="106" y="130" width="300" height="32" rx="12" fill="url(#barGrad)"/>
    <rect x="106" y="150" width="300" height="12" fill="url(#barGrad)"/>
    <!-- 窗口按钮 -->
    <circle cx="126" cy="146" r="5.5" fill="#ef4444"/>
    <circle cx="144" cy="146" r="5.5" fill="#f59e0b"/>
    <circle cx="162" cy="146" r="5.5" fill="#22c55e"/>
  </g>

  <!-- 终端内容 - 代码行 -->
  <g font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="13" filter="url(#glow)">
    <!-- 第一行：提示符 + 命令 -->
    <text x="125" y="188" fill="#22c55e">$</text>
    <text x="140" y="188" fill="#e2e8f0">cat</text>
    <text x="170" y="188" fill="#fbbf24">~/stars.log</text>
    <!-- 第二行：输出 -->
    <text x="125" y="212" fill="#94a3b8">[2025-06-15]</text>
    <text x="220" y="212" fill="#67e8f9">拾</text>
    <text x="237" y="212" fill="#67e8f9">得</text>
    <text x="254" y="212" fill="#67e8f9">新</text>
    <text x="271" y="212" fill="#67e8f9">星</text>
    <!-- 第三行 -->
    <text x="125" y="236" fill="#94a3b8">[systems]</text>
    <text x="205" y="236" fill="#a78bfa">kernel</text>
    <text x="255" y="236" fill="#6b7280">|</text>
    <text x="268" y="236" fill="#a78bfa">network</text>
    <text x="325" y="236" fill="#6b7280">|</text>
    <text x="338" y="236" fill="#a78bfa">fs</text>
    <!-- 第四行 -->
    <text x="125" y="260" fill="#94a3b8">[lang]</text>
    <text x="180" y="260" fill="#34d399">c++</text>
    <text x="210" y="260" fill="#6b7280">|</text>
    <text x="223" y="260" fill="#34d399">rust</text>
    <text x="260" y="260" fill="#6b7280">|</text>
    <text x="273" y="260" fill="#34d399">go</text>
    <!-- 第五行：光标 -->
    <text x="125" y="290" fill="#22c55e">$</text>
    <rect x="140" y="279" width="8" height="14" fill="#22c55e" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 从终端飘出的星尘 -->
  <g filter="url(#glow)">
    <circle cx="280" cy="115" r="3" fill="#fbbf24" opacity="0.9"/>
    <circle cx="320" cy="100" r="2.5" fill="#67e8f9" opacity="0.8"/>
    <circle cx="250" cy="95" r="2" fill="#a78bfa" opacity="0.7"/>
    <circle cx="300" cy="80" r="2.5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="340" cy="85" r="1.8" fill="#34d399" opacity="0.6"/>
    <circle cx="220" cy="80" r="2" fill="#67e8f9" opacity="0.6"/>
  </g>

  <!-- 底部装饰：二进制流 -->
  <g font-family="'SF Mono', monospace" font-size="9" fill="#374151" opacity="0.4">
    <text x="110" y="380">01101001 01101110 01110100</text>
    <text x="110" y="395">00101010 11010110 01001011</text>
    <text x="110" y="410">10110100 01011010 11100101</text>
  </g>
</svg>

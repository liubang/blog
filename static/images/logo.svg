<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="pearlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="50%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background circle - deep space -->
  <circle cx="256" cy="256" r="240" fill="#0f172a"/>
  <circle cx="256" cy="256" r="240" fill="url(#starGlow)" opacity="0.1"/>

  <!-- Scattered stars -->
  <circle cx="120" cy="100" r="2" fill="#e2e8f0" opacity="0.9"/>
  <circle cx="380" cy="80" r="1.5" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="90" cy="200" r="1.5" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="420" cy="180" r="2" fill="#e2e8f0" opacity="0.8"/>
  <circle cx="150" cy="150" r="1" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="350" cy="130" r="1.8" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="70" cy="300" r="1.5" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="440" cy="280" r="1.2" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="180" cy="80" r="1.2" fill="#e2e8f0" opacity="0.8"/>
  <circle cx="300" cy="90" r="1" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="400" cy="350" r="1.5" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="100" cy="380" r="1.2" fill="#e2e8f0" opacity="0.4"/>

  <!-- Milky way arc - subtle -->
  <path d="M 80 350 Q 200 200 350 180 Q 420 170 450 120" 
        fill="none" stroke="url(#shellGrad)" stroke-width="1.5" opacity="0.3"
        stroke-linecap="round"/>
  <path d="M 60 370 Q 180 220 330 200 Q 400 190 440 140" 
        fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.2"
        stroke-linecap="round"/>

  <!-- Shell body -->
  <path d="M 256 380 
           C 180 380 130 340 130 280 
           C 130 210 180 160 256 160 
           C 332 160 382 210 382 280 
           C 382 340 332 380 256 380 Z" 
        fill="url(#shellGrad)" opacity="0.9"/>

  <!-- Shell ridges -->
  <path d="M 256 165 C 240 220 220 280 200 370" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <path d="M 256 165 C 250 220 245 280 240 370" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <path d="M 256 165 C 260 220 265 280 270 370" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <path d="M 256 165 C 272 220 290 280 312 370" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>

  <!-- Shell opening highlight -->
  <ellipse cx="256" cy="365" rx="80" ry="18" fill="#1e1b4b" opacity="0.4"/>

  <!-- Pearl -->
  <circle cx="256" cy="320" r="28" fill="url(#pearlGrad)"/>
  <circle cx="246" cy="310" r="8" fill="#fffbeb" opacity="0.7"/>
  <circle cx="262" cy="305" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Bright star above shell - the "picked" star -->
  <g transform="translate(256, 130)">
    <circle cx="0" cy="0" r="12" fill="url(#starGlow)"/>
    <path d="M 0 -14 L 3 -4 L 14 -4 L 5 3 L 8 13 L 0 7 L -8 13 L -5 3 L -14 -4 L -3 -4 Z" 
          fill="#fde68a" opacity="0.95"/>
  </g>

  <!-- Small twinkling stars near the shell -->
  <path d="M 170 200 l 2 -6 l 2 6 l 6 2 l -6 2 l -2 6 l -2 -6 l -6 -2 z" fill="#e2e8f0" opacity="0.8"/>
  <path d="M 340 210 l 1.5 -4.5 l 1.5 4.5 l 4.5 1.5 l -4.5 1.5 l -1.5 4.5 l -1.5 -4.5 l -4.5 -1.5 z" fill="#e2e8f0" opacity="0.7"/>
  <path d="M 200 140 l 1 -3 l 1 3 l 3 1 l -3 1 l -1 3 l -1 -3 l -3 -1 z" fill="#fde68a" opacity="0.6"/>
  <path d="M 320 150 l 1 -3 l 1 3 l 3 1 l -3 1 l -1 3 l -1 -3 l -3 -1 z" fill="#fde68a" opacity="0.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" fill="#020617"/>
  <rect width="880" height="460" fill="url(#grid)"/>

  <!-- Title -->
  <text x="40" y="36" fill="white" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">表达式优先级分层（低 → 高）</text>
  <text x="40" y="54" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">Recursive descent parsing — each level calls the next</text>

  <!-- Left priority scale -->
  <line x1="56" y1="76" x2="56" y2="400" stroke="#334155" stroke-width="1.5"/>
  <text x="50" y="88" text-anchor="end" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">低</text>
  <text x="50" y="404" text-anchor="end" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">高</text>
  <polygon points="56,400 52,390 60,390" fill="#64748b"/>

  <!-- Group backgrounds -->
  <!-- Control flow group -->
  <rect x="76" y="66" width="768" height="148" rx="8" fill="rgba(136, 19, 55, 0.15)" stroke="#fb7185" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="96" y="84" fill="#fb7185" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">CONTROL FLOW</text>

  <!-- Arithmetic / Comparison group -->
  <rect x="76" y="226" width="768" height="108" rx="8" fill="rgba(120, 53, 15, 0.15)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="96" y="244" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">ARITHMETIC / COMPARISON</text>

  <!-- Atomic group -->
  <rect x="76" y="346" width="768" height="56" rx="8" fill="rgba(6, 78, 59, 0.2)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="96" y="364" fill="#34d399" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">ATOMIC</text>

  <!-- ===== Arrows (behind nodes) ===== -->
  <!-- Pipe → LogOr -->
  <line x1="296" y1="114" x2="318" y2="114" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <!-- LogOr → LogAnd -->
  <line x1="456" y1="114" x2="478" y2="114" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <!-- LogAnd → LogUnary -->
  <line x1="616" y1="114" x2="638" y2="114" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <!-- LogUnary → Comparison -->
  <path d="M 710 134 V 158 H 298" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <!-- Comparison → Additive -->
  <path d="M 230 180 V 210 V 256" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <!-- Additive → Multiplicative -->
  <line x1="296" y1="278" x2="398" y2="278" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <!-- Multiplicative → Postfix -->
  <line x1="536" y1="278" x2="638" y2="278" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <!-- Postfix → Primary -->
  <path d="M 710 298 V 330 H 310 V 354" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- ===== Nodes ===== -->

  <!-- Level 1: Pipe (lowest) -->
  <rect x="158" y="94" width="140" height="40" rx="6" fill="#0f172a"/>
  <rect x="158" y="94" width="140" height="40" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="228" y="112" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Pipe</text>
  <text x="228" y="126" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">|&gt;</text>

  <!-- Level 2: Logical Or -->
  <rect x="318" y="94" width="140" height="40" rx="6" fill="#0f172a"/>
  <rect x="318" y="94" width="140" height="40" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="388" y="112" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Logical Or</text>
  <text x="388" y="126" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">or</text>

  <!-- Level 3: Logical And -->
  <rect x="478" y="94" width="140" height="40" rx="6" fill="#0f172a"/>
  <rect x="478" y="94" width="140" height="40" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="548" y="112" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Logical And</text>
  <text x="548" y="126" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">and</text>

  <!-- Level 4: Logical Unary -->
  <rect x="638" y="94" width="140" height="40" rx="6" fill="#0f172a"/>
  <rect x="638" y="94" width="140" height="40" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="708" y="112" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Logical Unary</text>
  <text x="708" y="126" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">not / exists</text>

  <!-- Level 5: Comparison -->
  <rect x="158" y="148" width="140" height="40" rx="6" fill="#0f172a"/>
  <rect x="158" y="148" width="140" height="40" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="228" y="166" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Comparison</text>
  <text x="228" y="180" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">&gt; &lt; == != =~ !~</text>

  <!-- Level 6: Additive -->
  <rect x="158" y="258" width="140" height="40" rx="6" fill="#0f172a"/>
  <rect x="158" y="258" width="140" height="40" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="228" y="276" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Additive</text>
  <text x="228" y="290" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">+ -</text>

  <!-- Level 7: Multiplicative -->
  <rect x="398" y="258" width="140" height="40" rx="6" fill="#0f172a"/>
  <rect x="398" y="258" width="140" height="40" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="468" y="276" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Multiplicative</text>
  <text x="468" y="290" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">* / %</text>

  <!-- Level 8: Postfix -->
  <rect x="638" y="258" width="140" height="40" rx="6" fill="#0f172a"/>
  <rect x="638" y="258" width="140" height="40" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="708" y="276" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Postfix</text>
  <text x="708" y="290" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">call / member / index</text>

  <!-- Level 9: Primary (highest) -->
  <rect x="158" y="358" width="300" height="36" rx="6" fill="#0f172a"/>
  <rect x="158" y="358" width="300" height="36" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="308" y="380" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Primary</text>
  <text x="480" y="380" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">literal / ident / paren / array / object / func</text>

  <!-- ===== Legend ===== -->
  <rect x="40" y="420" width="800" height="32" rx="4" fill="rgba(15, 23, 42, 0.5)"/>
  <rect x="56" y="432" width="12" height="8" rx="2" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="76" y="440" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">最低优先级</text>
  <rect x="196" y="432" width="12" height="8" rx="2" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="216" y="440" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">控制流/逻辑</text>
  <rect x="336" y="432" width="12" height="8" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="356" y="440" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">算术运算</text>
  <rect x="456" y="432" width="12" height="8" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="476" y="440" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">最高优先级</text>
  <line x1="596" y1="436" x2="624" y2="436" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <text x="632" y="440" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">解析调用方向</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-accent" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#020617"/>
  <rect width="880" height="520" fill="url(#grid)"/>

  <!-- Title -->
  <text x="40" y="36" fill="white" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">Flux 查询执行路径</text>
  <text x="40" y="54" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">From source code to output — full pipeline</text>

  <!-- Phase columns -->
  <rect x="40" y="68" width="192" height="400" rx="8" fill="rgba(8, 51, 68, 0.2)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="136" y="88" text-anchor="middle" fill="#22d3ee" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">FRONTEND</text>

  <rect x="252" y="68" width="192" height="400" rx="8" fill="rgba(120, 53, 15, 0.15)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="348" y="88" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">RUNTIME</text>

  <rect x="464" y="68" width="192" height="400" rx="8" fill="rgba(6, 78, 59, 0.2)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="560" y="88" text-anchor="middle" fill="#34d399" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">OPTIMIZER</text>

  <rect x="676" y="68" width="168" height="400" rx="8" fill="rgba(76, 29, 149, 0.2)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="760" y="88" text-anchor="middle" fill="#a78bfa" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">EXECUTION</text>

  <!-- ===== Arrows (drawn first, behind nodes) ===== -->

  <!-- 源码 → Scanner -->
  <line x1="136" y1="156" x2="136" y2="182" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Scanner → Parser -->
  <line x1="136" y1="232" x2="136" y2="258" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Parser → AST -->
  <line x1="136" y1="308" x2="136" y2="334" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- AST → 表达式求值 -->
  <path d="M 196 362 H 228 V 162 H 286" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- 表达式求值 → Builtin -->
  <line x1="348" y1="192" x2="348" y2="218" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Builtin → TableValue -->
  <line x1="348" y1="268" x2="348" y2="294" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- TableValue → Logical Plan -->
  <path d="M 408 322 H 440 V 162 H 498" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Logical → RBO -->
  <line x1="560" y1="192" x2="560" y2="238" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- RBO → Physical -->
  <line x1="560" y1="288" x2="560" y2="334" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Physical → Pipeline -->
  <path d="M 620 362 H 652 V 202 H 698" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Pipeline → 输出 -->
  <line x1="760" y1="232" x2="760" y2="298" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <!-- ===== Nodes ===== -->

  <!-- 1. Flux 源码 -->
  <rect x="76" y="108" width="120" height="48" rx="6" fill="#0f172a"/>
  <rect x="76" y="108" width="120" height="48" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="136" y="132" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Flux 源码</text>
  <text x="136" y="148" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">.flux file / -e</text>

  <!-- 2. Scanner -->
  <rect x="76" y="186" width="120" height="48" rx="6" fill="#0f172a"/>
  <rect x="76" y="186" width="120" height="48" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="136" y="210" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Scanner</text>
  <text x="136" y="226" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">lexer / tokens</text>

  <!-- 3. Parser -->
  <rect x="76" y="262" width="120" height="48" rx="6" fill="#0f172a"/>
  <rect x="76" y="262" width="120" height="48" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="136" y="286" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Parser</text>
  <text x="136" y="302" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">recursive descent</text>

  <!-- 4. AST -->
  <rect x="76" y="338" width="120" height="48" rx="6" fill="#0f172a"/>
  <rect x="76" y="338" width="120" height="48" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="136" y="362" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">AST</text>
  <text x="136" y="378" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">typed node tree</text>

  <!-- 5. 表达式求值 -->
  <rect x="288" y="138" width="120" height="56" rx="6" fill="#0f172a"/>
  <rect x="288" y="138" width="120" height="56" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="348" y="164" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">表达式求值</text>
  <text x="348" y="182" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">runtime_eval</text>

  <!-- 6. Builtin Registry -->
  <rect x="288" y="222" width="120" height="48" rx="6" fill="#0f172a"/>
  <rect x="288" y="222" width="120" height="48" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="348" y="246" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Builtin Registry</text>
  <text x="348" y="262" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">package + fn</text>

  <!-- 7. TableValue -->
  <rect x="288" y="298" width="120" height="48" rx="6" fill="#0f172a"/>
  <rect x="288" y="298" width="120" height="48" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="348" y="322" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">TableValue</text>
  <text x="348" y="338" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">lazy plan node</text>

  <!-- 8. Logical Plan -->
  <rect x="500" y="138" width="120" height="56" rx="6" fill="#0f172a"/>
  <rect x="500" y="138" width="120" height="56" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="164" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Logical Plan</text>
  <text x="560" y="182" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">relational tree</text>

  <!-- 9. RBO / CBO -->
  <rect x="500" y="242" width="120" height="48" rx="6" fill="#0f172a"/>
  <rect x="500" y="242" width="120" height="48" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="266" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">RBO / CBO</text>
  <text x="560" y="282" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">pushdown + rewrite</text>

  <!-- 10. Physical Plan -->
  <rect x="500" y="338" width="120" height="48" rx="6" fill="#0f172a"/>
  <rect x="500" y="338" width="120" height="48" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="362" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Physical Plan</text>
  <text x="560" y="378" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">operator tree</text>

  <!-- 11. Pipeline -->
  <rect x="700" y="178" width="120" height="56" rx="6" fill="#0f172a"/>
  <rect x="700" y="178" width="120" height="56" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="760" y="204" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Pipeline</text>
  <text x="760" y="222" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">driver + operator</text>

  <!-- 12. 输出 -->
  <rect x="700" y="302" width="120" height="48" rx="6" fill="#0f172a"/>
  <rect x="700" y="302" width="120" height="48" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="760" y="326" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">输出</text>
  <text x="760" y="342" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">human / csv / json</text>

  <!-- ===== Legend ===== -->
  <rect x="40" y="484" width="800" height="28" rx="4" fill="rgba(15, 23, 42, 0.5)"/>
  <rect x="56" y="494" width="12" height="8" rx="2" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="76" y="502" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">入口/出口</text>
  <rect x="166" y="494" width="12" height="8" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="186" y="502" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Frontend</text>
  <rect x="276" y="494" width="12" height="8" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="296" y="502" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Runtime</text>
  <rect x="386" y="494" width="12" height="8" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="406" y="502" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Optimizer</text>
  <rect x="496" y="494" width="12" height="8" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="516" y="502" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Execution</text>
  <line x1="606" y1="498" x2="634" y2="498" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <text x="642" y="502" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">数据流</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="720" height="580" viewBox="0 0 720 580">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="580" fill="#020617"/>
  <rect width="720" height="580" fill="url(#grid)"/>

  <!-- Title -->
  <text x="40" y="36" fill="white" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">Logical → Physical Plan</text>
  <text x="40" y="54" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="10">Query Engine Target Architecture</text>

  <!-- ===== Arrows (drawn first, behind nodes) ===== -->

  <!-- AST → Binder -->
  <line x1="360" y1="112" x2="360" y2="138" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Binder → Logical -->
  <line x1="360" y1="192" x2="360" y2="218" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Logical → RBO -->
  <path d="M 310 262 L 240 290" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Logical → CBO -->
  <path d="M 410 262 L 480 290" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- RBO → Physical -->
  <path d="M 240 340 L 310 368" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- CBO → Physical -->
  <path d="M 480 340 L 410 368" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Physical → Scheduler -->
  <line x1="360" y1="418" x2="360" y2="444" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Scheduler → Driver -->
  <line x1="360" y1="498" x2="360" y2="524" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ===== Phase Labels ===== -->
  <text x="660" y="100" fill="#a78bfa" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="600" text-anchor="end" opacity="0.7">ANALYSIS</text>
  <text x="660" y="310" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="600" text-anchor="end" opacity="0.7">OPTIMIZATION</text>
  <text x="660" y="390" fill="#22d3ee" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="600" text-anchor="end" opacity="0.7">EXECUTION</text>

  <!-- ===== Nodes ===== -->

  <!-- Flux AST -->
  <rect x="270" y="72" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="270" y="72" width="180" height="50" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="360" y="96" fill="white" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" text-anchor="middle">Flux AST</text>
  <text x="360" y="112" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">parsed syntax tree</text>

  <!-- Analyzer / Binder -->
  <rect x="270" y="148" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="270" y="148" width="180" height="50" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="360" y="172" fill="white" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" text-anchor="middle">Analyzer / Binder</text>
  <text x="360" y="188" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">type resolution</text>

  <!-- Logical Plan -->
  <rect x="270" y="224" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="270" y="224" width="180" height="50" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="360" y="248" fill="white" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" text-anchor="middle">Logical Plan</text>
  <text x="360" y="264" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">semantic representation</text>

  <!-- RBO -->
  <rect x="130" y="296" width="200" height="50" rx="6" fill="#0f172a"/>
  <rect x="130" y="296" width="200" height="50" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="230" y="318" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Rule-based Optimizer</text>
  <text x="230" y="336" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">pushdown · pruning · rewrite</text>

  <!-- CBO -->
  <rect x="390" y="296" width="200" height="50" rx="6" fill="#0f172a"/>
  <rect x="390" y="296" width="200" height="50" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="490" y="318" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">CBO Framework</text>
  <text x="490" y="336" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">statistics · cost model</text>

  <!-- Physical Plan -->
  <rect x="270" y="374" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="270" y="374" width="180" height="50" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="360" y="398" fill="white" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" text-anchor="middle">Physical Plan</text>
  <text x="360" y="414" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">execution topology</text>

  <!-- Scheduler -->
  <rect x="270" y="450" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="270" y="450" width="180" height="50" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="360" y="474" fill="white" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" text-anchor="middle">Scheduler</text>
  <text x="360" y="490" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">task dispatch</text>

  <!-- Driver / Operator Pipeline -->
  <rect x="240" y="526" width="240" height="50" rx="6" fill="#0f172a"/>
  <rect x="240" y="526" width="240" height="50" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="360" y="550" fill="white" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" text-anchor="middle">Driver / Operator Pipeline</text>
  <text x="360" y="566" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">Page stream → TableValue</text>

  <!-- ===== Legend ===== -->
  <rect x="60" y="440" width="12" height="8" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="80" y="448" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Analysis</text>

  <rect x="60" y="456" width="12" height="8" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="80" y="464" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Optimization</text>

  <rect x="60" y="472" width="12" height="8" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="80" y="480" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Execution</text>

  <rect x="60" y="488" width="12" height="8" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="80" y="496" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Output</text>
</svg>

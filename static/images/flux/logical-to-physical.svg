<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <defs>
    <style>
      .title { font: 600 20px 'PingFang SC', 'SF Pro Display', sans-serif; fill: #1c1917; }
      .node-name { font: 600 12px 'PingFang SC', 'SF Pro Text', sans-serif; fill: #1c1917; }
      .node-sub { font: 400 9px 'SF Mono', 'Fira Code', monospace; fill: #78716c; }
      .group-label { font: 600 10px 'SF Mono', 'Fira Code', monospace; fill: #78716c; letter-spacing: 0.08em; }
      .legend-text { font: 400 9px 'SF Mono', 'Fira Code', monospace; fill: #78716c; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a8a29e"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="720" height="520" fill="#fafaf9" rx="4"/>

  <!-- 标题 -->
  <text x="40" y="36" class="title">Logical → Physical Plan 目标结构</text>

  <!-- 分组背景：分析层 -->
  <rect x="40" y="52" width="640" height="130" rx="6" fill="rgba(147,51,234,0.03)" stroke="rgba(147,51,234,0.12)" stroke-width="1"/>
  <text x="56" y="68" class="group-label">ANALYSIS</text>

  <!-- 分组背景：优化层 -->
  <rect x="40" y="194" width="640" height="80" rx="6" fill="rgba(217,119,6,0.03)" stroke="rgba(217,119,6,0.12)" stroke-width="1"/>
  <text x="56" y="210" class="group-label">OPTIMIZATION</text>

  <!-- 分组背景：执行层 -->
  <rect x="40" y="286" width="640" height="130" rx="6" fill="rgba(37,99,235,0.03)" stroke="rgba(37,99,235,0.12)" stroke-width="1"/>
  <text x="56" y="302" class="group-label">EXECUTION</text>

  <!-- 分组背景：数据层 -->
  <rect x="40" y="428" width="640" height="60" rx="6" fill="rgba(22,163,74,0.03)" stroke="rgba(22,163,74,0.12)" stroke-width="1"/>
  <text x="56" y="444" class="group-label">OUTPUT</text>

  <!-- ===== 节点 ===== -->

  <!-- Flux AST -->
  <rect x="280" y="72" width="160" height="36" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1.2"/>
  <text x="360" y="94" text-anchor="middle" class="node-name">Flux AST</text>

  <!-- Analyzer / Binder -->
  <rect x="280" y="120" width="160" height="36" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1.2"/>
  <text x="360" y="142" text-anchor="middle" class="node-name">Analyzer / Binder</text>

  <!-- Logical Plan -->
  <rect x="280" y="168" width="160" height="36" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1"/>
  <text x="360" y="190" text-anchor="middle" class="node-name">Logical Plan</text>

  <!-- RBO -->
  <rect x="180" y="218" width="160" height="36" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <text x="260" y="236" text-anchor="middle" class="node-name">Rule-based Optimizer</text>
  <text x="260" y="248" text-anchor="middle" class="node-sub">pushdown / pruning / rewrite</text>

  <!-- CBO -->
  <rect x="380" y="218" width="160" height="36" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <text x="460" y="236" text-anchor="middle" class="node-name">CBO Framework</text>
  <text x="460" y="248" text-anchor="middle" class="node-sub">statistics + cost model</text>

  <!-- Physical Plan -->
  <rect x="280" y="306" width="160" height="36" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="360" y="328" text-anchor="middle" class="node-name">Physical Plan</text>

  <!-- Scheduler -->
  <rect x="280" y="354" width="160" height="36" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="360" y="376" text-anchor="middle" class="node-name">Scheduler</text>

  <!-- Driver / Operator Pipeline -->
  <rect x="250" y="402" width="220" height="36" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="360" y="424" text-anchor="middle" class="node-name">Driver / Operator Pipeline</text>

  <!-- Page / Chunk Stream -->
  <rect x="220" y="448" width="140" height="36" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="290" y="470" text-anchor="middle" class="node-name">Page Stream</text>

  <!-- TableValue Materialization -->
  <rect x="400" y="448" width="180" height="36" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="490" y="470" text-anchor="middle" class="node-name">TableValue Materialization</text>

  <!-- ===== 箭头 ===== -->

  <!-- AST → Binder -->
  <line x1="360" y1="108" x2="360" y2="120" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Binder → Logical -->
  <line x1="360" y1="156" x2="360" y2="168" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Logical → RBO -->
  <path d="M 320 204 V 210 H 260 V 218" fill="none" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Logical → CBO -->
  <path d="M 400 204 V 210 H 460 V 218" fill="none" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- RBO → Physical -->
  <path d="M 260 254 V 270 H 330 V 306" fill="none" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- CBO → Physical -->
  <path d="M 460 254 V 270 H 390 V 306" fill="none" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Physical → Scheduler -->
  <line x1="360" y1="342" x2="360" y2="354" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Scheduler → Driver -->
  <line x1="360" y1="390" x2="360" y2="402" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Driver → Page Stream -->
  <path d="M 320 438 V 442 H 290 V 448" fill="none" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Driver → Materialization -->
  <path d="M 400 438 V 442 H 490 V 448" fill="none" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 图例 -->
  <line x1="40" y1="500" x2="680" y2="500" stroke="rgba(28,25,23,0.1)" stroke-width="0.8"/>
  <rect x="40" y="506" width="12" height="12" rx="2" fill="#faf5ff" stroke="#9333ea" stroke-width="1"/>
  <text x="60" y="516" class="legend-text">分析层</text>
  <rect x="140" y="506" width="12" height="12" rx="2" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="160" y="516" class="legend-text">优化层</text>
  <rect x="240" y="506" width="12" height="12" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="260" y="516" class="legend-text">执行层</text>
  <rect x="340" y="506" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="516" class="legend-text">数据输出</text>
</svg>

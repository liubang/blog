<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
  </defs>

  <rect width="960" height="600" fill="#020617"/>
  <rect width="960" height="600" fill="url(#grid)"/>

  <text x="40" y="38" fill="white" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">Flux Logical to Physical Plan</text>
  <text x="40" y="58" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">semantic plan rewrite → physical topology → page-based driver execution</text>

  <!-- Arrows behind nodes -->
  <line x1="150" y1="125" x2="215" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="345" y1="125" x2="410" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="540" y1="125" x2="605" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="735" y1="125" x2="800" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <path d="M 280 160 V 215 H 158" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/>
  <path d="M 280 160 V 215 H 402" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/>
  <path d="M 475 250 V 292" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="540" y1="325" x2="625" y2="325" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <path d="M 690 160 V 215 H 785" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <path d="M 865 250 V 300 H 775" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <line x1="775" y1="360" x2="775" y2="405" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <path d="M 775 465 V 510 H 545" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M 475 360 V 510" fill="none" stroke="#fb7185" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#arrow-rose)"/>

  <!-- Top flow -->
  <rect x="40" y="90" width="110" height="70" rx="6" fill="#0f172a"/>
  <rect x="40" y="90" width="110" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="95" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Flux AST</text>
  <text x="95" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">pipe/call/lambda</text>
  <text x="95" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">source location</text>

  <rect x="215" y="90" width="130" height="70" rx="6" fill="#0f172a"/>
  <rect x="215" y="90" width="130" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="280" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Logical Plan</text>
  <text x="280" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">SourceScan/Filter</text>
  <text x="280" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">Project/Aggregate</text>

  <rect x="410" y="90" width="130" height="70" rx="6" fill="#0f172a"/>
  <rect x="410" y="90" width="130" height="70" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="475" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Optimizer</text>
  <text x="475" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">RBO first</text>
  <text x="475" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">CBO framework</text>

  <rect x="605" y="90" width="130" height="70" rx="6" fill="#0f172a"/>
  <rect x="605" y="90" width="130" height="70" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="670" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Physical Plan</text>
  <text x="670" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">scan/exchange</text>
  <text x="670" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">blocking boundary</text>

  <rect x="800" y="90" width="120" height="70" rx="6" fill="#0f172a"/>
  <rect x="800" y="90" width="120" height="70" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="860" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">ExecutionTask</text>
  <text x="860" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">pipelines</text>
  <text x="860" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">drivers</text>

  <!-- Logical details -->
  <rect x="55" y="205" width="130" height="58" rx="6" fill="#0f172a"/>
  <rect x="55" y="205" width="130" height="58" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="120" y="228" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">Semantics</text>
  <text x="120" y="245" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">no SQL string</text>

  <rect x="375" y="205" width="140" height="58" rx="6" fill="#0f172a"/>
  <rect x="375" y="205" width="140" height="58" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="445" y="228" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">Plan Rewrite</text>
  <text x="445" y="245" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">pushdown/pruning</text>

  <rect x="785" y="205" width="150" height="58" rx="6" fill="#0f172a"/>
  <rect x="785" y="205" width="150" height="58" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="860" y="228" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">TaskExecutor</text>
  <text x="860" y="245" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">worker pool</text>

  <!-- Physical / driver area -->
  <rect x="625" y="292" width="300" height="190" rx="12" fill="rgba(6, 78, 59, 0.12)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="645" y="313" fill="#34d399" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">PAGE PIPELINE</text>

  <rect x="650" y="330" width="110" height="50" rx="6" fill="#0f172a"/>
  <rect x="650" y="330" width="110" height="50" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="705" y="351" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">Source</text>
  <text x="705" y="366" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">split/page source</text>

  <rect x="790" y="330" width="110" height="50" rx="6" fill="#0f172a"/>
  <rect x="790" y="330" width="110" height="50" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="845" y="351" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">Operators</text>
  <text x="845" y="366" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">filter/project/agg</text>

  <line x1="760" y1="355" x2="790" y2="355" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <rect x="715" y="412" width="120" height="54" rx="6" fill="#0f172a"/>
  <rect x="715" y="412" width="120" height="54" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="775" y="434" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">Exchange</text>
  <text x="775" y="451" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">partition/root merge</text>

  <!-- Fallback and output -->
  <rect x="410" y="292" width="130" height="68" rx="6" fill="#0f172a"/>
  <rect x="410" y="292" width="130" height="68" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="475" y="318" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">Materialize</text>
  <text x="475" y="335" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">unsupported suffix</text>
  <text x="475" y="349" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">TableValue fallback</text>

  <rect x="345" y="510" width="200" height="58" rx="6" fill="#0f172a"/>
  <rect x="345" y="510" width="200" height="58" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="445" y="533" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Output / Profile</text>
  <text x="445" y="550" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">rows/pages/drivers/splits</text>

  <!-- Side notes -->
  <rect x="55" y="330" width="230" height="96" rx="8" fill="#0f172a"/>
  <rect x="55" y="330" width="230" height="96" rx="8" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="75" y="354" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">Plan invariants</text>
  <text x="75" y="374" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">• logical nodes carry semantics</text>
  <text x="75" y="392" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">• physical nodes carry topology</text>
  <text x="75" y="410" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">• operators exchange Page objects</text>

  <!-- Legend -->
  <circle cx="665" cy="535" r="4" fill="#a78bfa"/>
  <text x="676" y="538" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">analysis</text>
  <circle cx="735" cy="535" r="4" fill="#fbbf24"/>
  <text x="746" y="538" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">optimization</text>
  <circle cx="830" cy="535" r="4" fill="#34d399"/>
  <text x="841" y="538" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">execution</text>
  <circle cx="665" cy="558" r="4" fill="#fb7185"/>
  <text x="676" y="561" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">fallback boundary</text>
</svg>

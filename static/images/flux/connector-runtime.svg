<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="380" fill="#020617"/>
  <rect width="880" height="380" fill="url(#grid)"/>

  <!-- Title -->
  <text x="40" y="36" fill="white" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">Connector Runtime 分层</text>
  <text x="40" y="54" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">Registry → Runtime → Capability → Data output</text>

  <!-- Layer backgrounds -->
  <!-- Registry layer -->
  <rect x="40" y="66" width="800" height="60" rx="6" fill="rgba(76, 29, 149, 0.15)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="60" y="82" fill="#a78bfa" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">REGISTRY</text>

  <!-- Runtime layer -->
  <rect x="40" y="138" width="800" height="60" rx="6" fill="rgba(8, 51, 68, 0.2)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="60" y="154" fill="#22d3ee" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">RUNTIME</text>

  <!-- Capability layer -->
  <rect x="40" y="210" width="800" height="60" rx="6" fill="rgba(120, 53, 15, 0.15)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="60" y="226" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">CAPABILITY</text>

  <!-- Data layer -->
  <rect x="40" y="282" width="800" height="60" rx="6" fill="rgba(6, 78, 59, 0.2)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="60" y="298" fill="#34d399" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">DATA</text>

  <!-- ===== Arrows (behind nodes) ===== -->

  <!-- Registry → Runtime -->
  <line x1="440" y1="114" x2="440" y2="146" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Runtime → Metadata -->
  <path d="M 340 186 V 200 H 220 V 218" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Runtime → Split -->
  <line x1="440" y1="186" x2="440" y2="218" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Runtime → PageSource -->
  <path d="M 540 186 V 200 H 660 V 218" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- PageSource → Page -->
  <path d="M 660 258 V 274 H 440 V 290" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== Nodes ===== -->

  <!-- Connector Registry -->
  <rect x="340" y="78" width="200" height="44" rx="6" fill="#0f172a"/>
  <rect x="340" y="78" width="200" height="44" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Connector Registry</text>
  <text x="440" y="114" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">sqlite / mysql / memory</text>

  <!-- Connector Runtime -->
  <rect x="340" y="150" width="200" height="44" rx="6" fill="#0f172a"/>
  <rect x="340" y="150" width="200" height="44" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="440" y="172" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Connector Runtime</text>
  <text x="440" y="186" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">lifecycle + config</text>

  <!-- Metadata -->
  <rect x="140" y="222" width="160" height="44" rx="6" fill="#0f172a"/>
  <rect x="140" y="222" width="160" height="44" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="220" y="244" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Metadata</text>
  <text x="220" y="258" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">schema + statistics</text>

  <!-- Split Manager -->
  <rect x="360" y="222" width="160" height="44" rx="6" fill="#0f172a"/>
  <rect x="360" y="222" width="160" height="44" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="440" y="244" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Split Manager</text>
  <text x="440" y="258" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">range / rowid partition</text>

  <!-- Page Source -->
  <rect x="580" y="222" width="160" height="44" rx="6" fill="#0f172a"/>
  <rect x="580" y="222" width="160" height="44" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="660" y="244" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Page Source</text>
  <text x="660" y="258" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">split → page stream</text>

  <!-- Page -->
  <rect x="320" y="294" width="240" height="44" rx="6" fill="#0f172a"/>
  <rect x="320" y="294" width="240" height="44" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="440" y="316" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">Page / PageChunk / ColumnVector</text>
  <text x="440" y="330" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">columnar batch output</text>

  <!-- ===== Legend ===== -->
  <rect x="40" y="354" width="800" height="22" rx="4" fill="rgba(15, 23, 42, 0.5)"/>
  <rect x="56" y="361" width="12" height="8" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="76" y="369" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">注册</text>
  <rect x="136" y="361" width="12" height="8" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="156" y="369" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">运行时</text>
  <rect x="236" y="361" width="12" height="8" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="256" y="369" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">能力模块</text>
  <rect x="356" y="361" width="12" height="8" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="376" y="369" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">数据输出</text>
  <line x1="476" y1="365" x2="504" y2="365" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="512" y="369" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">数据流</text>
</svg>

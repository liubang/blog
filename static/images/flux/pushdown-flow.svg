<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
  </defs>

  <rect width="960" height="520" fill="#020617"/>
  <rect width="960" height="520" fill="url(#grid)"/>

  <text x="40" y="38" fill="white" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">Flux Pushdown Flow</text>
  <text x="40" y="58" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">safe prefix pushdown + page streaming + materialized fallback</text>

  <!-- Arrows behind nodes -->
  <line x1="160" y1="125" x2="245" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="125" x2="460" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="590" y1="125" x2="675" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M 780 155 V 210 H 265" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="390" y1="230" x2="475" y2="230" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="605" y1="230" x2="690" y2="230" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M 560 155 V 342 H 475" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-rose)"/>
  <line x1="345" y1="360" x2="260" y2="360" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-rose)"/>

  <!-- Main flow nodes -->
  <rect x="40" y="90" width="120" height="70" rx="6" fill="#0f172a"/>
  <rect x="40" y="90" width="120" height="70" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="100" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Flux Source</text>
  <text x="100" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">sqlite.from</text>
  <text x="100" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">pipe chain</text>

  <rect x="245" y="90" width="130" height="70" rx="6" fill="#0f172a"/>
  <rect x="245" y="90" width="130" height="70" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="310" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Logical Plan</text>
  <text x="310" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">SourceScan + nodes</text>
  <text x="310" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">range/filter/keep</text>

  <rect x="460" y="90" width="130" height="70" rx="6" fill="#0f172a"/>
  <rect x="460" y="90" width="130" height="70" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="525" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">RBO</text>
  <text x="525" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">safe prefix</text>
  <text x="525" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">barrier insertion</text>

  <rect x="675" y="90" width="130" height="70" rx="6" fill="#0f172a"/>
  <rect x="675" y="90" width="130" height="70" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="740" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Contract</text>
  <text x="740" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">predicate/projection</text>
  <text x="740" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">sort/limit/agg</text>

  <!-- Connector runtime boundary -->
  <rect x="110" y="190" width="740" height="120" rx="12" fill="rgba(6, 78, 59, 0.12)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="130" y="210" fill="#34d399" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">CONNECTOR RUNTIME</text>

  <rect x="135" y="220" width="130" height="58" rx="6" fill="#0f172a"/>
  <rect x="135" y="220" width="130" height="58" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="200" y="243" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Metadata</text>
  <text x="200" y="260" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">schema/stats</text>

  <rect x="475" y="220" width="130" height="58" rx="6" fill="#0f172a"/>
  <rect x="475" y="220" width="130" height="58" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="540" y="243" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Split Manager</text>
  <text x="540" y="260" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">rowid/range split</text>

  <rect x="690" y="220" width="130" height="58" rx="6" fill="#0f172a"/>
  <rect x="690" y="220" width="130" height="58" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="755" y="243" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Page Source</text>
  <text x="755" y="260" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">SQL → Page</text>

  <!-- Execution / fallback -->
  <rect x="675" y="340" width="150" height="66" rx="6" fill="#0f172a"/>
  <rect x="675" y="340" width="150" height="66" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="750" y="365" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Page Pipeline</text>
  <text x="750" y="383" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">filter/project/range</text>
  <text x="750" y="397" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">accumulator/top-n</text>

  <rect x="345" y="330" width="130" height="60" rx="6" fill="#0f172a"/>
  <rect x="345" y="330" width="130" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="410" y="354" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Barrier</text>
  <text x="410" y="372" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">unsupported suffix</text>

  <rect x="110" y="330" width="150" height="60" rx="6" fill="#0f172a"/>
  <rect x="110" y="330" width="150" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="185" y="354" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">TableValue</text>
  <text x="185" y="372" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">memory builtin fallback</text>

  <rect x="330" y="438" width="300" height="48" rx="6" fill="#0f172a"/>
  <rect x="330" y="438" width="300" height="48" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="460" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Output / Explain / Profile</text>
  <text x="480" y="476" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">rows/pages/splits/bytes/wall-time + barriers</text>

  <path d="M 750 406 V 438 H 570" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M 185 390 V 438 H 390" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <circle cx="705" cy="464" r="4" fill="#34d399"/>
  <text x="715" y="467" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">pushed path</text>
  <circle cx="790" cy="464" r="4" fill="#fb7185"/>
  <text x="800" y="467" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">fallback path</text>
</svg>

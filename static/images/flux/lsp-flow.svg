<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="960" height="560" fill="#020617"/>
  <rect width="960" height="560" fill="url(#grid)"/>

  <text x="40" y="38" fill="white" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">Flux Language Server Flow</text>
  <text x="40" y="58" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">JSON-RPC request routing + versioned document cache + shared semantic services</text>

  <!-- Arrows -->
  <line x1="150" y1="125" x2="220" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="125" x2="420" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="550" y1="125" x2="625" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M 700 160 V 210 H 255" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="355" y1="250" x2="440" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="250" x2="645" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M 725 280 V 338 H 475" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <line x1="475" y1="395" x2="575" y2="395" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="695" y1="395" x2="780" y2="395" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Top protocol flow -->
  <rect x="40" y="90" width="110" height="70" rx="6" fill="#0f172a"/>
  <rect x="40" y="90" width="110" height="70" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="95" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Editor</text>
  <text x="95" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">VSCode/Vim</text>
  <text x="95" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">requests</text>

  <rect x="220" y="90" width="130" height="70" rx="6" fill="#0f172a"/>
  <rect x="220" y="90" width="130" height="70" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="285" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Transport</text>
  <text x="285" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">Content-Length</text>
  <text x="285" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">stdin/stdout</text>

  <rect x="420" y="90" width="130" height="70" rx="6" fill="#0f172a"/>
  <rect x="420" y="90" width="130" height="70" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="485" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">JSON-RPC</text>
  <text x="485" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">id/method/params</text>
  <text x="485" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">safe JSON helpers</text>

  <rect x="625" y="90" width="150" height="70" rx="6" fill="#0f172a"/>
  <rect x="625" y="90" width="150" height="70" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="700" y="116" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Dispatcher</text>
  <text x="700" y="134" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">initialize/didChange</text>
  <text x="700" y="148" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">feature handlers</text>

  <!-- Shared state boundary -->
  <rect x="110" y="190" width="725" height="120" rx="12" fill="rgba(76, 29, 149, 0.12)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="130" y="210" fill="#a78bfa" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">VERSIONED DOCUMENT SERVICES</text>

  <rect x="145" y="220" width="110" height="58" rx="6" fill="#0f172a"/>
  <rect x="145" y="220" width="110" height="58" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="200" y="243" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">Document</text>
  <text x="200" y="260" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">uri/content/version</text>

  <rect x="440" y="220" width="120" height="58" rx="6" fill="#0f172a"/>
  <rect x="440" y="220" width="120" height="58" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="500" y="243" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">ensure_ast</text>
  <text x="500" y="260" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">AST cache</text>

  <rect x="645" y="220" width="120" height="58" rx="6" fill="#0f172a"/>
  <rect x="645" y="220" width="120" height="58" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="705" y="243" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">ensure_symbols</text>
  <text x="705" y="260" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">scope + references</text>

  <!-- Feature handlers -->
  <rect x="235" y="338" width="240" height="114" rx="8" fill="#0f172a"/>
  <rect x="235" y="338" width="240" height="114" rx="8" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="355" y="362" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Semantic Feature Handlers</text>
  <text x="255" y="386" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">• diagnostics / documentSymbol</text>
  <text x="255" y="404" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">• completion / hover / signatureHelp</text>
  <text x="255" y="422" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">• definition / references / rename</text>
  <text x="255" y="440" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">• semanticTokens / codeAction / hints</text>

  <rect x="575" y="365" width="120" height="60" rx="6" fill="#0f172a"/>
  <rect x="575" y="365" width="120" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="635" y="389" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">JSON Result</text>
  <text x="635" y="407" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">structured payload</text>

  <rect x="780" y="365" width="125" height="60" rx="6" fill="#0f172a"/>
  <rect x="780" y="365" width="125" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="842" y="389" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">Response</text>
  <text x="842" y="407" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">result/error/notify</text>

  <!-- Notes -->
  <rect x="55" y="470" width="360" height="50" rx="6" fill="#0f172a"/>
  <rect x="55" y="470" width="360" height="50" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="75" y="492" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">Invariant</text>
  <text x="150" y="492" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">protocol layer stays thin; semantic handlers share parser and symbol state</text>
  <text x="75" y="510" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">cache keys include document version, so didChange invalidates AST and symbol table safely</text>

  <circle cx="590" cy="495" r="4" fill="#22d3ee"/>
  <text x="602" y="498" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">protocol</text>
  <circle cx="660" cy="495" r="4" fill="#a78bfa"/>
  <text x="672" y="498" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">shared analysis</text>
  <circle cx="780" cy="495" r="4" fill="#34d399"/>
  <text x="792" y="498" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">features</text>
</svg>

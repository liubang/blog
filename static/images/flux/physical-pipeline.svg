<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="240" fill="#020617"/>
  <rect width="880" height="240" fill="url(#grid)"/>

  <!-- Title -->
  <text x="40" y="32" fill="white" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">Physical Plan → Pipeline</text>
  <text x="40" y="48" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">Execution Path: ConnectorRuntime → Page Stream</text>

  <!-- ===== Arrows (behind nodes) ===== -->
  <line x1="168" y1="100" x2="198" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="318" y1="100" x2="348" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="488" y1="100" x2="518" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="638" y1="100" x2="668" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="768" y1="100" x2="798" y2="100" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== Nodes ===== -->

  <!-- ConnectorRuntime -->
  <rect x="40" y="70" width="128" height="60" rx="6" fill="#0f172a"/>
  <rect x="40" y="70" width="128" height="60" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="104" y="96" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">Connector</text>
  <text x="104" y="110" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle">Runtime</text>
  <text x="104" y="124" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">lifecycle + config</text>

  <!-- Split -->
  <rect x="200" y="70" width="118" height="60" rx="6" fill="#0f172a"/>
  <rect x="200" y="70" width="118" height="60" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="259" y="98" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Split</text>
  <text x="259" y="116" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">range partition</text>

  <!-- PageSource -->
  <rect x="350" y="70" width="138" height="60" rx="6" fill="#0f172a"/>
  <rect x="350" y="70" width="138" height="60" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="419" y="98" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">PageSource</text>
  <text x="419" y="116" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">split → page stream</text>

  <!-- Pipeline -->
  <rect x="520" y="70" width="118" height="60" rx="6" fill="#0f172a"/>
  <rect x="520" y="70" width="118" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="579" y="98" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Pipeline</text>
  <text x="579" y="116" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">task graph</text>

  <!-- Driver -->
  <rect x="670" y="70" width="98" height="60" rx="6" fill="#0f172a"/>
  <rect x="670" y="70" width="98" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="719" y="98" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Driver</text>
  <text x="719" y="116" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">operator chain</text>

  <!-- Page -->
  <rect x="800" y="70" width="60" height="60" rx="6" fill="#0f172a"/>
  <rect x="800" y="70" width="60" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="830" y="98" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">Page</text>
  <text x="830" y="116" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">columnar</text>

  <!-- Data channel annotation -->
  <rect x="40" y="156" width="820" height="32" rx="6" fill="rgba(6, 78, 59, 0.15)" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="450" y="176" fill="#34d399" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500" text-anchor="middle">Page / PageChunk / ColumnVector — operator 间的统一数据通道</text>

  <!-- Legend -->
  <rect x="40" y="210" width="12" height="8" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="60" y="218" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Connector</text>

  <rect x="160" y="210" width="12" height="8" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="180" y="218" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Scheduling</text>

  <rect x="300" y="210" width="12" height="8" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="320" y="218" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Output</text>

  <line x1="420" y1="214" x2="448" y2="214" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="456" y="218" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">Page data flow</text>
</svg>

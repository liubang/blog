<svg xmlns="http://www.w3.org/2000/svg" width="880" height="200" viewBox="0 0 880 200">
  <defs>
    <style>
      .title { font: 600 20px 'PingFang SC', 'SF Pro Display', sans-serif; fill: #1c1917; }
      .node-name { font: 600 11px 'PingFang SC', 'SF Pro Text', sans-serif; fill: #1c1917; }
      .node-sub { font: 400 9px 'SF Mono', 'Fira Code', monospace; fill: #78716c; }
      .phase-label { font: 600 9px 'SF Mono', 'Fira Code', monospace; fill: #78716c; letter-spacing: 0.06em; }
      .legend-text { font: 400 9px 'SF Mono', 'Fira Code', monospace; fill: #78716c; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a8a29e"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="880" height="200" fill="#fafaf9" rx="4"/>

  <!-- 标题 -->
  <text x="40" y="32" class="title">Physical Plan → Pipeline 执行路径</text>

  <!-- 阶段标签 -->
  <text x="100" y="60" text-anchor="middle" class="phase-label">CONNECTOR</text>
  <text x="260" y="60" text-anchor="middle" class="phase-label">CONNECTOR</text>
  <text x="420" y="60" text-anchor="middle" class="phase-label">CONNECTOR</text>
  <text x="560" y="60" text-anchor="middle" class="phase-label">SCHEDULING</text>
  <text x="690" y="60" text-anchor="middle" class="phase-label">SCHEDULING</text>
  <text x="820" y="60" text-anchor="middle" class="phase-label">OUTPUT</text>

  <!-- 节点 -->
  <!-- ConnectorRuntime -->
  <rect x="30" y="72" width="140" height="44" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1.2"/>
  <text x="100" y="94" text-anchor="middle" class="node-name">ConnectorRuntime</text>
  <text x="100" y="108" text-anchor="middle" class="node-sub">lifecycle + config</text>

  <!-- Split -->
  <rect x="200" y="72" width="120" height="44" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1.2"/>
  <text x="260" y="94" text-anchor="middle" class="node-name">Split</text>
  <text x="260" y="108" text-anchor="middle" class="node-sub">range partition</text>

  <!-- PageSource -->
  <rect x="350" y="72" width="140" height="44" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1.2"/>
  <text x="420" y="94" text-anchor="middle" class="node-name">PageSource</text>
  <text x="420" y="108" text-anchor="middle" class="node-sub">split → page stream</text>

  <!-- Pipeline -->
  <rect x="520" y="72" width="100" height="44" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="570" y="94" text-anchor="middle" class="node-name">Pipeline</text>
  <text x="570" y="108" text-anchor="middle" class="node-sub">task graph</text>

  <!-- Driver -->
  <rect x="650" y="72" width="100" height="44" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="700" y="94" text-anchor="middle" class="node-name">Driver</text>
  <text x="700" y="108" text-anchor="middle" class="node-sub">operator chain</text>

  <!-- Page -->
  <rect x="780" y="72" width="80" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="820" y="94" text-anchor="middle" class="node-name">Page</text>
  <text x="820" y="108" text-anchor="middle" class="node-sub">columnar batch</text>

  <!-- 箭头 -->
  <line x1="170" y1="94" x2="198" y2="94" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="320" y1="94" x2="348" y2="94" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="490" y1="94" x2="518" y2="94" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="620" y1="94" x2="648" y2="94" stroke="#a8a29e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="750" y1="94" x2="778" y2="94" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arr-green)"/>

  <!-- 数据流标注 -->
  <rect x="30" y="132" width="830" height="36" rx="4" fill="rgba(22,163,74,0.03)" stroke="rgba(22,163,74,0.12)" stroke-width="1"/>
  <text x="440" y="154" text-anchor="middle" class="node-sub" style="fill:#16a34a; font-size:10px;">
    Page / PageChunk / ColumnVector — operator 间的统一数据通道
  </text>

  <!-- 图例 -->
  <line x1="40" y1="180" x2="840" y2="180" stroke="rgba(28,25,23,0.1)" stroke-width="0.8"/>
  <rect x="40" y="186" width="12" height="12" rx="2" fill="#faf5ff" stroke="#9333ea" stroke-width="1"/>
  <text x="60" y="196" class="legend-text">Connector 层</text>
  <rect x="200" y="186" width="12" height="12" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="220" y="196" class="legend-text">调度层</text>
  <rect x="340" y="186" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="196" class="legend-text">数据输出</text>
  <line x1="480" y1="192" x2="508" y2="192" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <text x="516" y="196" class="legend-text">Page 数据流</text>
</svg>

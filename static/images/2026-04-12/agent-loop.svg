<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="loop-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="in-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="out-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#020617"/>
  <rect width="880" height="400" fill="url(#grid)"/>

  <text x="40" y="32" fill="white" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">Agent 的典型执行回路</text>

  <!-- Orbit ring -->
  <circle cx="440" cy="215" r="130" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="4,6"/>

  <!-- Center LLM -->
  <circle cx="440" cy="215" r="52" fill="#0f172a"/>
  <circle cx="440" cy="215" r="52" fill="rgba(8, 51, 68, 0.6)" stroke="#22d3ee" stroke-width="2"/>
  <text x="440" y="210" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">LLM</text>
  <text x="440" y="228" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">思考 &amp; 决策</text>

  <!-- Plan node (top) -->
  <rect x="373" y="48" width="134" height="50" rx="6" fill="#0f172a"/>
  <rect x="373" y="48" width="134" height="50" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="440" y="70" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">规划 Plan</text>
  <text x="440" y="86" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">拆解任务，选择下一步</text>

  <!-- Act node (bottom-right) -->
  <rect x="580" y="295" width="134" height="50" rx="6" fill="#0f172a"/>
  <rect x="580" y="295" width="134" height="50" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="647" y="317" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">行动 Act</text>
  <text x="647" y="333" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">调用工具，执行操作</text>

  <!-- Observe node (bottom-left) -->
  <rect x="166" y="295" width="134" height="50" rx="6" fill="#0f172a"/>
  <rect x="166" y="295" width="134" height="50" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="233" y="317" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">观察 Observe</text>
  <text x="233" y="333" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="8">获取结果，更新上下文</text>

  <!-- Loop arcs: Plan → Act -->
  <path d="M507 73 C610 80, 680 170, 670 293" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#loop-arrow)"/>
  <text x="630" y="175" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="8">执行决策</text>

  <!-- Loop arcs: Act → Observe -->
  <path d="M580 325 C490 375, 380 375, 300 325" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#loop-arrow)"/>
  <text x="440" y="372" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="8">返回结果</text>

  <!-- Loop arcs: Observe → Plan -->
  <path d="M210 295 C190 190, 280 100, 373 73" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#loop-arrow)"/>
  <text x="252" y="175" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="8">更新上下文</text>

  <!-- User input -->
  <rect x="30" y="196" width="96" height="38" rx="19" fill="#0f172a"/>
  <rect x="30" y="196" width="96" height="38" rx="19" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="78" y="220" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">用户输入</text>
  <line x1="126" y1="215" x2="386" y2="215" stroke="#34d399" stroke-width="1.5" marker-end="url(#in-arrow)"/>

  <!-- Final output -->
  <rect x="754" y="196" width="96" height="38" rx="19" fill="#0f172a"/>
  <rect x="754" y="196" width="96" height="38" rx="19" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="802" y="220" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">最终回答</text>
  <line x1="494" y1="215" x2="752" y2="215" stroke="#fb923c" stroke-width="1.5" marker-end="url(#out-arrow)"/>
  <text x="623" y="207" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="8">任务完成</text>
</svg>

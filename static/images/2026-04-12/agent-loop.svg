<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <defs>
    <style>
      .title { font: 700 26px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 18px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .step1 { fill: #eaf3ff; stroke: #5f95d1; stroke-width: 2; rx: 18; }
      .step2 { fill: #eefaf3; stroke: #71b78d; stroke-width: 2; rx: 18; }
      .step3 { fill: #fff8e8; stroke: #d6b15a; stroke-width: 2; rx: 18; }
      .decision { fill: #ffffff; stroke: #7ea8d8; stroke-width: 2; }
      .arrow { stroke: #5f8ec0; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f8ec0"/>
    </marker>
  </defs>
  <rect width="980" height="420" fill="#ffffff"/>
  <text x="40" y="46" class="title">Agent 的典型执行回路</text>
  <rect x="80" y="150" width="170" height="90" class="step1"/>
  <text x="165" y="186" text-anchor="middle" class="label">理解目标</text>
  <text x="165" y="214" text-anchor="middle" class="sub">先判断用户想完成什么</text>
  <rect x="300" y="150" width="170" height="90" class="step2"/>
  <text x="385" y="186" text-anchor="middle" class="label">规划下一步</text>
  <text x="385" y="214" text-anchor="middle" class="sub">决定先查位置还是先查天气</text>
  <rect x="520" y="150" width="170" height="90" class="step3"/>
  <text x="605" y="186" text-anchor="middle" class="label">调用工具</text>
  <text x="605" y="214" text-anchor="middle" class="sub">执行定位、天气、门店查询</text>
  <rect x="740" y="150" width="150" height="90" class="step1"/>
  <text x="815" y="186" text-anchor="middle" class="label">观察结果</text>
  <text x="815" y="214" text-anchor="middle" class="sub">根据返回值更新计划</text>
  <path d="M250 195 H298" class="arrow"/>
  <path d="M470 195 H518" class="arrow"/>
  <path d="M690 195 H738" class="arrow"/>
  <polygon points="490,315 590,260 690,315 590,370" class="decision"/>
  <text x="590" y="310" text-anchor="middle" class="label">任务完成？</text>
  <path d="M815 240 C815 280,690 280,640 290" class="arrow"/>
  <path d="M540 315 H330 C260 315,260 240,300 220" class="arrow"/>
  <path d="M690 315 H840" class="arrow"/>
  <text x="395" y="300" class="sub">否，继续循环</text>
  <text x="845" y="307" class="sub">是，输出最终回答</text>
</svg>

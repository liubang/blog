<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280">
  <defs>
    <style>
      .title { font: 700 22px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 15px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .note { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #6b8299; }
      .step1 { fill: #eaf3ff; stroke: #5f95d1; stroke-width: 1.5; rx: 12; }
      .step2 { fill: #eefaf3; stroke: #71b78d; stroke-width: 1.5; rx: 12; }
      .step3 { fill: #fff8e8; stroke: #d6b15a; stroke-width: 1.5; rx: 12; }
      .decision { fill: #ffffff; stroke: #7ea8d8; stroke-width: 1.5; }
      .arrow { stroke: #5f8ec0; stroke-width: 2.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5f8ec0"/>
    </marker>
  </defs>
  <rect width="880" height="280" fill="#ffffff" rx="8"/>
  <text x="40" y="38" class="title">Agent 的典型执行回路</text>
  <!-- 理解目标 -->
  <rect x="50" y="70" width="160" height="70" class="step1"/>
  <text x="130" y="100" text-anchor="middle" class="label">理解目标</text>
  <text x="130" y="120" text-anchor="middle" class="sub">判断用户想完成什么</text>
  <!-- 规划下一步 -->
  <rect x="240" y="70" width="160" height="70" class="step2"/>
  <text x="320" y="100" text-anchor="middle" class="label">规划下一步</text>
  <text x="320" y="120" text-anchor="middle" class="sub">决定调用哪个工具</text>
  <!-- 调用工具 -->
  <rect x="430" y="70" width="160" height="70" class="step3"/>
  <text x="510" y="100" text-anchor="middle" class="label">调用工具</text>
  <text x="510" y="120" text-anchor="middle" class="sub">执行并获取结果</text>
  <!-- 观察结果 -->
  <rect x="620" y="70" width="160" height="70" class="step1"/>
  <text x="700" y="100" text-anchor="middle" class="label">观察结果</text>
  <text x="700" y="120" text-anchor="middle" class="sub">根据返回值更新计划</text>
  <!-- 箭头：主流程 -->
  <path d="M210 105 H238" class="arrow"/>
  <path d="M400 105 H428" class="arrow"/>
  <path d="M590 105 H618" class="arrow"/>
  <!-- 判断菱形 -->
  <polygon points="510,190 580,220 510,250 440,220" class="decision"/>
  <text x="510" y="224" text-anchor="middle" class="label">完成？</text>
  <!-- 观察结果 -> 判断 -->
  <path d="M700 140 V220 H582" class="arrow"/>
  <!-- 否：回到规划 -->
  <path d="M440 220 H320 V142" class="arrow"/>
  <text x="370" y="212" class="note">否</text>
  <!-- 是：输出 -->
  <path d="M580 220 H820" class="arrow"/>
  <text x="800" y="212" class="note">是 → 输出最终回答</text>
</svg>

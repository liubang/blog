<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <style>
      .title { font: 700 22px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 700 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 400 11.5px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #5a7a94; }
      .note { font: 500 11px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #8a9fb3; }
      .center-label { font: 700 15px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #ffffff; }
      .center-sub { font: 400 10.5px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #c8ddf5; }
      .loop-arrow { fill: none; stroke: #8aafc8; stroke-width: 2.2; marker-end: url(#loop-tip); }
      .in-arrow { fill: none; stroke: #5a9e6f; stroke-width: 2; marker-end: url(#in-tip); }
      .out-arrow { fill: none; stroke: #d4805a; stroke-width: 2; marker-end: url(#out-tip); }
    </style>
    <marker id="loop-tip" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0.5 L6,3 L0,5.5 Z" fill="#8aafc8"/>
    </marker>
    <marker id="in-tip" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0.5 L6,3 L0,5.5 Z" fill="#5a9e6f"/>
    </marker>
    <marker id="out-tip" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0.5 L6,3 L0,5.5 Z" fill="#d4805a"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a3a5c" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="880" height="400" fill="#ffffff" rx="8"/>
  <text x="40" y="36" class="title">Agent 的典型执行回路</text>

  <!-- 中心 LLM -->
  <circle cx="440" cy="215" r="50" fill="#3a6fa5" filter="url(#shadow)"/>
  <circle cx="440" cy="215" r="46" fill="none" stroke="#5a9fd5" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="440" y="211" text-anchor="middle" class="center-label">LLM</text>
  <text x="440" y="228" text-anchor="middle" class="center-sub">思考 &amp; 决策</text>

  <!-- 虚线轨道 -->
  <circle cx="440" cy="215" r="135" fill="none" stroke="#e8eff5" stroke-width="1.2" stroke-dasharray="3 5"/>

  <!-- Plan - 正上方 -->
  <rect x="373" y="48" width="134" height="50" rx="10" fill="#eefaf3" stroke="#8ecaa5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="71" text-anchor="middle" class="label">规划 Plan</text>
  <text x="440" y="87" text-anchor="middle" class="sub">拆解任务，选择下一步</text>

  <!-- Act - 右下 -->
  <rect x="570" y="300" width="134" height="50" rx="10" fill="#fff8e8" stroke="#dcc06a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="637" y="323" text-anchor="middle" class="label">行动 Act</text>
  <text x="637" y="339" text-anchor="middle" class="sub">调用工具，执行操作</text>

  <!-- Observe - 左下 -->
  <rect x="176" y="300" width="134" height="50" rx="10" fill="#f3eeff" stroke="#a594d6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="243" y="323" text-anchor="middle" class="label">观察 Observe</text>
  <text x="243" y="339" text-anchor="middle" class="sub">获取结果，更新上下文</text>

  <!-- 循环弧线：Plan → Act -->
  <path d="M507 75 C600 75, 670 170, 660 298" class="loop-arrow"/>

  <!-- 循环弧线：Act → Observe -->
  <path d="M570 330 C480 380, 390 380, 310 330" class="loop-arrow"/>

  <!-- 循环弧线：Observe → Plan -->
  <path d="M220 300 C200 190, 280 100, 373 75" class="loop-arrow"/>

  <!-- 弧线标注 -->
  <text x="610" y="178" text-anchor="middle" class="note">执行决策</text>
  <text x="440" y="378" text-anchor="middle" class="note">返回结果</text>
  <text x="262" y="178" text-anchor="middle" class="note">更新上下文</text>

  <!-- 用户输入 -->
  <rect x="30" y="196" width="96" height="38" rx="19" fill="#f0f7ff" stroke="#7eaed0" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="78" y="220" text-anchor="middle" class="label">用户输入</text>
  <path d="M126 215 H383" class="in-arrow"/>

  <!-- 最终回答 -->
  <rect x="754" y="196" width="96" height="38" rx="19" fill="#fef5f0" stroke="#d4805a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="802" y="220" text-anchor="middle" class="label">最终回答</text>
  <path d="M497 215 H747" class="out-arrow"/>
  <text x="622" y="206" text-anchor="middle" class="note">任务完成</text>
</svg>

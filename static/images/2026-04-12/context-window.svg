<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <defs>
    <style>
      .title { font: 700 22px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 15px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .note { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #6b8299; }
      .shell { fill: #f7fbff; stroke: #5c8fcb; stroke-width: 2; rx: 16; }
      .chip1 { fill: #eaf3ff; stroke: #7da6d9; stroke-width: 1.5; rx: 10; }
      .chip2 { fill: #eefaf3; stroke: #77ba92; stroke-width: 1.5; rx: 10; }
      .chip3 { fill: #fff8e7; stroke: #d7b25c; stroke-width: 1.5; rx: 10; }
    </style>
  </defs>
  <rect width="880" height="340" fill="#ffffff" rx="8"/>
  <text x="40" y="38" class="title">Context 与 Context Window</text>
  <!-- 外框 -->
  <rect x="40" y="60" width="800" height="230" class="shell"/>
  <text x="440" y="88" text-anchor="middle" class="label">Context Window：一次请求最多能装下的 Token 总量</text>
  <!-- 第一行 -->
  <rect x="70" y="108" width="230" height="60" class="chip1"/>
  <text x="185" y="134" text-anchor="middle" class="label">System Prompt</text>
  <text x="185" y="152" text-anchor="middle" class="sub">角色、规则、边界</text>
  <rect x="320" y="108" width="230" height="60" class="chip2"/>
  <text x="435" y="134" text-anchor="middle" class="label">历史对话</text>
  <text x="435" y="152" text-anchor="middle" class="sub">之前聊过的内容</text>
  <rect x="570" y="108" width="240" height="60" class="chip3"/>
  <text x="690" y="134" text-anchor="middle" class="label">当前问题</text>
  <text x="690" y="152" text-anchor="middle" class="sub">这一次想让模型做什么</text>
  <!-- 第二行 -->
  <rect x="70" y="186" width="230" height="60" class="chip2"/>
  <text x="185" y="212" text-anchor="middle" class="label">工具定义</text>
  <text x="185" y="230" text-anchor="middle" class="sub">有哪些 Tool 可用</text>
  <rect x="320" y="186" width="230" height="60" class="chip3"/>
  <text x="435" y="212" text-anchor="middle" class="label">检索片段（RAG）</text>
  <text x="435" y="230" text-anchor="middle" class="sub">外部补充信息</text>
  <rect x="570" y="186" width="240" height="60" class="chip1"/>
  <text x="690" y="212" text-anchor="middle" class="label">生成中的输出</text>
  <text x="690" y="230" text-anchor="middle" class="sub">已生成的回答前缀</text>
  <!-- 底部说明 -->
  <text x="440" y="318" text-anchor="middle" class="note">这些内容加在一起，构成模型本次真正看到的完整输入。</text>
</svg>

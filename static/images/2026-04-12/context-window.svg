<svg xmlns="http://www.w3.org/2000/svg" width="980" height="480" viewBox="0 0 980 480">
  <defs>
    <style>
      .title { font: 700 26px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 17px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .shell { fill: #f7fbff; stroke: #5c8fcb; stroke-width: 3; rx: 24; }
      .chip1 { fill: #eaf3ff; stroke: #7da6d9; stroke-width: 2; rx: 16; }
      .chip2 { fill: #eefaf3; stroke: #77ba92; stroke-width: 2; rx: 16; }
      .chip3 { fill: #fff8e7; stroke: #d7b25c; stroke-width: 2; rx: 16; }
    </style>
  </defs>
  <rect width="980" height="480" fill="#ffffff"/>
  <text x="40" y="46" class="title">Context 与 Context Window</text>
  <rect x="40" y="86" width="900" height="340" class="shell"/>
  <text x="490" y="120" text-anchor="middle" class="label">Context Window：一次请求最多能装下多少 Token</text>
  <rect x="90" y="160" width="220" height="90" class="chip1"/>
  <text x="200" y="196" text-anchor="middle" class="label">System Prompt</text>
  <text x="200" y="222" text-anchor="middle" class="sub">角色、规则、边界</text>
  <rect x="360" y="160" width="260" height="90" class="chip2"/>
  <text x="490" y="196" text-anchor="middle" class="label">历史对话</text>
  <text x="490" y="222" text-anchor="middle" class="sub">之前聊过的内容</text>
  <rect x="670" y="160" width="220" height="90" class="chip3"/>
  <text x="780" y="196" text-anchor="middle" class="label">当前问题</text>
  <text x="780" y="222" text-anchor="middle" class="sub">这一次想让模型做什么</text>
  <rect x="130" y="282" width="220" height="90" class="chip2"/>
  <text x="240" y="318" text-anchor="middle" class="label">工具定义</text>
  <text x="240" y="344" text-anchor="middle" class="sub">有哪些 Tool 可用</text>
  <rect x="390" y="282" width="220" height="90" class="chip3"/>
  <text x="500" y="318" text-anchor="middle" class="label">检索片段</text>
  <text x="500" y="344" text-anchor="middle" class="sub">RAG / 外部补充信息</text>
  <rect x="650" y="282" width="180" height="90" class="chip1"/>
  <text x="740" y="318" text-anchor="middle" class="label">生成中的输出</text>
  <text x="740" y="344" text-anchor="middle" class="sub">已生成的回答前缀</text>
  <text x="490" y="450" text-anchor="middle" class="sub">这些内容加在一起，构成模型本次真正看到的完整输入。</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="880" height="320" fill="#020617"/>
  <rect width="880" height="320" fill="url(#grid)"/>

  <text x="40" y="32" fill="white" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">Context 与 Context Window</text>

  <!-- Outer boundary -->
  <rect x="40" y="52" width="800" height="220" rx="12" fill="rgba(8, 51, 68, 0.1)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="440" y="74" text-anchor="middle" fill="#22d3ee" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">Context Window：一次请求最多能装下的 Token 总量</text>

  <!-- Row 1 -->
  <!-- System Prompt -->
  <rect x="70" y="90" width="230" height="60" rx="6" fill="#0f172a"/>
  <rect x="70" y="90" width="230" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="185" y="116" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">System Prompt</text>
  <text x="185" y="134" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">角色、规则、边界</text>

  <!-- 历史对话 -->
  <rect x="320" y="90" width="230" height="60" rx="6" fill="#0f172a"/>
  <rect x="320" y="90" width="230" height="60" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="435" y="116" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">历史对话</text>
  <text x="435" y="134" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">之前聊过的内容</text>

  <!-- 当前问题 -->
  <rect x="570" y="90" width="240" height="60" rx="6" fill="#0f172a"/>
  <rect x="570" y="90" width="240" height="60" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="690" y="116" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">当前问题</text>
  <text x="690" y="134" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">这一次想让模型做什么</text>

  <!-- Row 2 -->
  <!-- 工具定义 -->
  <rect x="70" y="168" width="230" height="60" rx="6" fill="#0f172a"/>
  <rect x="70" y="168" width="230" height="60" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="185" y="194" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">工具定义</text>
  <text x="185" y="212" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">有哪些 Tool 可用</text>

  <!-- 检索片段 -->
  <rect x="320" y="168" width="230" height="60" rx="6" fill="#0f172a"/>
  <rect x="320" y="168" width="230" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="435" y="194" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">检索片段（RAG）</text>
  <text x="435" y="212" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">外部补充信息</text>

  <!-- 生成中的输出 -->
  <rect x="570" y="168" width="240" height="60" rx="6" fill="#0f172a"/>
  <rect x="570" y="168" width="240" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="690" y="194" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">生成中的输出</text>
  <text x="690" y="212" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">已生成的回答前缀</text>

  <!-- 底部说明 -->
  <rect x="140" y="286" width="600" height="28" rx="4" fill="rgba(15, 23, 42, 0.5)" stroke="#1e293b" stroke-width="1"/>
  <text x="440" y="304" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">这些内容加在一起，构成模型本次真正看到的完整输入</text>
</svg>

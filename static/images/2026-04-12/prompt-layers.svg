<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260">
  <defs>
    <style>
      .title { font: 700 22px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 15px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .note { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #6b8299; }
      .shell { fill: #f8fbff; stroke: #7da7d8; stroke-width: 2; rx: 16; }
      .sys { fill: #eaf3ff; stroke: #5f94d1; stroke-width: 1.5; rx: 12; }
      .usr { fill: #eefaf3; stroke: #6db78f; stroke-width: 1.5; rx: 12; }
      .llm { fill: #fff8e8; stroke: #d6b15a; stroke-width: 1.5; rx: 12; }
      .arrow { stroke: #5f8ec0; stroke-width: 2.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5f8ec0"/>
    </marker>
  </defs>
  <rect width="880" height="260" fill="#ffffff" rx="8"/>
  <text x="40" y="38" class="title">Prompt 分层：角色设定与任务指令分开传递</text>
  <!-- 外框：请求整体 -->
  <rect x="40" y="60" width="560" height="150" class="shell"/>
  <text x="320" y="86" text-anchor="middle" class="note">AI 应用发给模型的一次完整请求</text>
  <!-- System Prompt -->
  <rect x="70" y="100" width="230" height="80" class="sys"/>
  <text x="185" y="132" text-anchor="middle" class="label">System Prompt</text>
  <text x="185" y="154" text-anchor="middle" class="sub">定义角色、规则、边界</text>
  <!-- User Prompt -->
  <rect x="340" y="100" width="230" height="80" class="usr"/>
  <text x="455" y="132" text-anchor="middle" class="label">User Prompt</text>
  <text x="455" y="154" text-anchor="middle" class="sub">描述当前问题和具体任务</text>
  <!-- LLM -->
  <rect x="660" y="100" width="180" height="80" class="llm"/>
  <text x="750" y="132" text-anchor="middle" class="label">LLM</text>
  <text x="750" y="154" text-anchor="middle" class="sub">综合两层 Prompt 后生成回复</text>
  <!-- 箭头 -->
  <path d="M300 140 H338" class="arrow"/>
  <path d="M600 140 H658" class="arrow"/>
  <!-- 底部说明 -->
  <text x="440" y="240" text-anchor="middle" class="note">System Prompt 由开发者预设（用户不可见），User Prompt 由用户实时输入。</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240">
  <defs>
    <style>
      .title { font: 700 22px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 15px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 13px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .note { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #6b8299; }
      .card { fill: #f8fbff; stroke: #8cb3d9; stroke-width: 1.5; rx: 12; }
      .accent { fill: #eaf4ff; stroke: #4e8ecf; stroke-width: 1.5; rx: 12; }
      .arrow { stroke: #4e8ecf; stroke-width: 2.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4e8ecf"/>
    </marker>
  </defs>
  <rect width="880" height="240" fill="#ffffff" rx="8"/>
  <text x="40" y="38" class="title">LLM 逐 Token 生成过程</text>
  <!-- 用户输入 -->
  <rect x="40" y="65" width="140" height="80" class="card"/>
  <text x="110" y="96" text-anchor="middle" class="label">用户输入</text>
  <text x="110" y="118" text-anchor="middle" class="sub">今天天气怎么样</text>
  <!-- 第1次预测 -->
  <rect x="210" y="65" width="130" height="80" class="accent"/>
  <text x="275" y="96" text-anchor="middle" class="label">第 1 次预测</text>
  <text x="275" y="118" text-anchor="middle" class="sub">输出 Token：今</text>
  <!-- 第2次预测 -->
  <rect x="370" y="65" width="130" height="80" class="accent"/>
  <text x="435" y="96" text-anchor="middle" class="label">第 2 次预测</text>
  <text x="435" y="118" text-anchor="middle" class="sub">输出 Token：天</text>
  <!-- 继续生成 -->
  <rect x="530" y="65" width="130" height="80" class="accent"/>
  <text x="595" y="96" text-anchor="middle" class="label">继续生成</text>
  <text x="595" y="118" text-anchor="middle" class="sub">输出 Token：…</text>
  <!-- 最终结果 -->
  <rect x="690" y="65" width="150" height="80" class="card"/>
  <text x="765" y="96" text-anchor="middle" class="label">最终结果</text>
  <text x="765" y="118" text-anchor="middle" class="sub">今天天气晴朗</text>
  <!-- 箭头 -->
  <path d="M180 105 H208" class="arrow"/>
  <path d="M340 105 H368" class="arrow"/>
  <path d="M500 105 H528" class="arrow"/>
  <path d="M660 105 H688" class="arrow"/>
  <!-- 底部说明 -->
  <text x="440" y="195" text-anchor="middle" class="note">核心机制：模型每次只预测"下一个最可能出现的 Token"，不断循环直到结束。</text>
</svg>

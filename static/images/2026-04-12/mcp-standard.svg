<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="880" height="300" fill="#020617"/>
  <rect width="880" height="300" fill="url(#grid)"/>

  <text x="40" y="32" fill="white" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">MCP：把"每个平台一套接法"变成"统一标准接一次"</text>

  <!-- Left panel: 没有 MCP -->
  <rect x="40" y="52" width="380" height="210" rx="12" fill="rgba(136, 19, 55, 0.1)" stroke="#fb7185" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="230" y="74" text-anchor="middle" fill="#fb7185" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">没有 MCP</text>

  <!-- 同一个工具 (left) -->
  <rect x="70" y="110" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="70" y="110" width="120" height="50" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="140" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">同一个工具</text>

  <!-- 三个规范 -->
  <rect x="250" y="90" width="130" height="36" rx="6" fill="#0f172a"/>
  <rect x="250" y="90" width="130" height="36" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="315" y="112" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">OpenAI 规范</text>

  <rect x="250" y="136" width="130" height="36" rx="6" fill="#0f172a"/>
  <rect x="250" y="136" width="130" height="36" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="315" y="158" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">Anthropic 规范</text>

  <rect x="250" y="182" width="130" height="36" rx="6" fill="#0f172a"/>
  <rect x="250" y="182" width="130" height="36" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="315" y="204" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">Google 规范</text>

  <!-- Arrows left -->
  <line x1="190" y1="125" x2="248" y2="108" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <line x1="190" y1="135" x2="248" y2="154" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <line x1="190" y1="145" x2="248" y2="200" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- Right panel: 有了 MCP -->
  <rect x="460" y="52" width="390" height="210" rx="12" fill="rgba(6, 78, 59, 0.1)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="655" y="74" text-anchor="middle" fill="#34d399" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">有了 MCP</text>

  <!-- 同一个工具 (right) -->
  <rect x="490" y="120" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="490" y="120" width="120" height="50" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="550" y="150" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">同一个工具</text>

  <!-- MCP 标准 -->
  <rect x="660" y="120" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="660" y="120" width="120" height="50" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="720" y="150" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">MCP 标准</text>

  <line x1="610" y1="145" x2="658" y2="145" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 下方平台 -->
  <rect x="610" y="205" width="70" height="32" rx="6" fill="#0f172a"/>
  <rect x="610" y="205" width="70" height="32" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="645" y="225" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="8">平台 A</text>

  <rect x="690" y="205" width="70" height="32" rx="6" fill="#0f172a"/>
  <rect x="690" y="205" width="70" height="32" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="725" y="225" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="8">平台 B</text>

  <rect x="770" y="205" width="50" height="32" rx="6" fill="#0f172a"/>
  <rect x="770" y="205" width="50" height="32" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="795" y="225" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="8">…</text>

  <line x1="720" y1="170" x2="645" y2="203" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="720" y1="170" x2="720" y2="203" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="720" y1="170" x2="795" y2="203" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- 底部说明 -->
  <rect x="140" y="274" width="600" height="22" rx="4" fill="rgba(15, 23, 42, 0.5)" stroke="#1e293b" stroke-width="1"/>
  <text x="440" y="289" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">工具只需实现一次 MCP 协议，即可被所有支持 MCP 的平台调用</text>
</svg>

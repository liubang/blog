<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <defs>
    <style>
      .title { font: 700 22px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 15px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 13px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .panel { fill: #f8fbff; stroke: #d8e3ef; stroke-width: 1.5; rx: 14; }
      .box1 { fill: #ffffff; stroke: #7ea8d8; stroke-width: 1.5; rx: 10; }
      .box2 { fill: #eefaf3; stroke: #72b78e; stroke-width: 1.5; rx: 10; }
      .box3 { fill: #fff8e8; stroke: #d6b05a; stroke-width: 1.5; rx: 10; }
      .arrow { stroke: #5f8ec0; stroke-width: 2.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5f8ec0"/>
    </marker>
  </defs>
  <rect width="880" height="300" fill="#ffffff" rx="8"/>
  <text x="40" y="38" class="title">MCP：把"每个平台一套接法"变成"统一标准接一次"</text>
  <!-- 左侧面板：没有 MCP -->
  <rect x="40" y="60" width="380" height="210" class="panel"/>
  <text x="230" y="88" text-anchor="middle" class="label">没有 MCP</text>
  <rect x="80" y="120" width="120" height="50" class="box1"/>
  <text x="140" y="150" text-anchor="middle" class="sub">同一个工具</text>
  <rect x="260" y="100" width="120" height="40" class="box3"/>
  <text x="320" y="125" text-anchor="middle" class="sub">OpenAI 规范</text>
  <rect x="260" y="150" width="120" height="40" class="box3"/>
  <text x="320" y="175" text-anchor="middle" class="sub">Anthropic 规范</text>
  <rect x="260" y="200" width="120" height="40" class="box3"/>
  <text x="320" y="225" text-anchor="middle" class="sub">Google 规范</text>
  <path d="M200 135 H258" class="arrow"/>
  <path d="M200 145 L230 170 H258" class="arrow"/>
  <path d="M200 155 L230 220 H258" class="arrow"/>
  <!-- 右侧面板：有了 MCP -->
  <rect x="460" y="60" width="380" height="210" class="panel"/>
  <text x="650" y="88" text-anchor="middle" class="label">有了 MCP</text>
  <rect x="500" y="130" width="120" height="50" class="box1"/>
  <text x="560" y="160" text-anchor="middle" class="sub">同一个工具</text>
  <rect x="670" y="130" width="120" height="50" class="box2"/>
  <text x="730" y="160" text-anchor="middle" class="sub">MCP 标准</text>
  <path d="M620 155 H668" class="arrow"/>
  <!-- 下方平台 -->
  <rect x="630" y="210" width="80" height="36" class="box3"/>
  <text x="670" y="233" text-anchor="middle" class="sub">平台 A</text>
  <rect x="720" y="210" width="80" height="36" class="box3"/>
  <text x="760" y="233" text-anchor="middle" class="sub">平台 B</text>
  <rect x="810" y="210" width="40" height="36" class="box3"/>
  <text x="830" y="233" text-anchor="middle" class="sub">…</text>
  <path d="M730 180 V208" class="arrow"/>
  <path d="M730 180 L670 208" class="arrow"/>
  <path d="M730 180 L830 208" class="arrow"/>
</svg>

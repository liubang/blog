<svg xmlns="http://www.w3.org/2000/svg" width="880" height="220" viewBox="0 0 880 220">
  <defs>
    <style>
      .title { font: 700 22px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 15px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 13px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .note { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #6b8299; }
      .box1 { fill: #f7fbff; stroke: #77a6d8; stroke-width: 1.5; rx: 12; }
      .box2 { fill: #eefaf3; stroke: #6bb58d; stroke-width: 1.5; rx: 12; }
      .box3 { fill: #fff8e8; stroke: #d8b15a; stroke-width: 1.5; rx: 12; }
      .arrow { stroke: #5e8fbe; stroke-width: 2.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5e8fbe"/>
    </marker>
  </defs>
  <rect width="880" height="220" fill="#ffffff" rx="8"/>
  <text x="40" y="38" class="title">Tokenizer 编解码流程</text>
  <!-- 原始文本 -->
  <rect x="40" y="65" width="170" height="80" class="box1"/>
  <text x="125" y="96" text-anchor="middle" class="label">原始文本</text>
  <text x="125" y="118" text-anchor="middle" class="sub">helpfulness</text>
  <!-- 切分 Token -->
  <rect x="250" y="65" width="170" height="80" class="box2"/>
  <text x="335" y="96" text-anchor="middle" class="label">切分 Token</text>
  <text x="335" y="118" text-anchor="middle" class="sub">help + fulness</text>
  <!-- 映射 ID -->
  <rect x="460" y="65" width="170" height="80" class="box3"/>
  <text x="545" y="96" text-anchor="middle" class="label">映射 Token ID</text>
  <text x="545" y="118" text-anchor="middle" class="sub">[1839, 52177]</text>
  <!-- 解码输出 -->
  <rect x="670" y="65" width="170" height="80" class="box1"/>
  <text x="755" y="96" text-anchor="middle" class="label">解码输出</text>
  <text x="755" y="118" text-anchor="middle" class="sub">还原为人类可读文本</text>
  <!-- 箭头 -->
  <path d="M210 105 H248" class="arrow"/>
  <path d="M420 105 H458" class="arrow"/>
  <path d="M630 105 H668" class="arrow"/>
  <!-- 底部说明 -->
  <text x="440" y="190" text-anchor="middle" class="note">模型只处理数字；Tokenizer 负责在人类语言和 Token ID 之间翻译。</text>
</svg>

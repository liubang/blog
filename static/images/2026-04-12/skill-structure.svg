<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="880" height="240" fill="#020617"/>
  <rect width="880" height="240" fill="url(#grid)"/>

  <text x="40" y="32" fill="white" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">Agent Skill 的文档结构</text>

  <!-- 元数据层 -->
  <rect x="100" y="56" width="680" height="64" rx="6" fill="#0f172a"/>
  <rect x="100" y="56" width="680" height="64" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="440" y="82" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600">元数据层 Metadata</text>
  <text x="440" y="104" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">name / description — 用于 Agent 快速识别和匹配</text>

  <!-- 指令层 -->
  <rect x="100" y="136" width="680" height="64" rx="6" fill="#0f172a"/>
  <rect x="100" y="136" width="680" height="64" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="440" y="162" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600">指令层 Instructions</text>
  <text x="440" y="184" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">目标、执行步骤、判断规则、输出格式、示例</text>

  <!-- 底部说明 -->
  <rect x="140" y="214" width="600" height="22" rx="4" fill="rgba(15, 23, 42, 0.5)" stroke="#1e293b" stroke-width="1"/>
  <text x="440" y="229" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">Agent 先读元数据做匹配，命中后再按需加载详细指令（节省 Token）</text>
</svg>

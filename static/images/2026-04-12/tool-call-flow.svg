<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#020617"/>
  <rect width="880" height="420" fill="url(#grid)"/>

  <text x="40" y="32" fill="white" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">Tool 调用完整流程</text>

  <!-- Participant headers -->
  <rect x="80" y="52" width="100" height="32" rx="6" fill="#0f172a"/>
  <rect x="80" y="52" width="100" height="32" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="130" y="72" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">用户</text>

  <rect x="290" y="52" width="100" height="32" rx="6" fill="#0f172a"/>
  <rect x="290" y="52" width="100" height="32" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="340" y="72" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">平台</text>

  <rect x="520" y="52" width="100" height="32" rx="6" fill="#0f172a"/>
  <rect x="520" y="52" width="100" height="32" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="570" y="72" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">大模型</text>

  <rect x="730" y="52" width="100" height="32" rx="6" fill="#0f172a"/>
  <rect x="730" y="52" width="100" height="32" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="780" y="72" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">工具</text>

  <!-- Lifelines -->
  <line x1="130" y1="84" x2="130" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="340" y1="84" x2="340" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="570" y1="84" x2="570" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="780" y1="84" x2="780" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: 用户 → 平台 -->
  <line x1="130" y1="120" x2="332" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="231" y="112" text-anchor="middle" fill="#22d3ee" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="500">① 今天上海天气？</text>

  <!-- Step 2: 平台 → 大模型 -->
  <line x1="340" y1="160" x2="562" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="451" y="152" text-anchor="middle" fill="#22d3ee" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="500">② 转发问题 + 工具列表</text>

  <!-- Step 3: 大模型返回工具调用指令 -->
  <line x1="570" y1="205" x2="348" y2="205" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <text x="459" y="197" text-anchor="middle" fill="#a78bfa" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="500">③ 输出工具调用指令</text>
  <text x="459" y="220" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono', monospace" font-size="8">weather_query("上海")</text>

  <!-- Step 4: 平台 → 工具 -->
  <line x1="340" y1="260" x2="772" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="560" y="252" text-anchor="middle" fill="#34d399" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="500">④ 解析指令，调用工具</text>

  <!-- Step 5: 工具返回结果 -->
  <line x1="780" y1="305" x2="348" y2="305" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <text x="560" y="297" text-anchor="middle" fill="#34d399" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="500">⑤ 返回天气数据</text>

  <!-- Step 6: 平台 → 大模型 -->
  <line x1="340" y1="345" x2="562" y2="345" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="451" y="337" text-anchor="middle" fill="#22d3ee" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="500">⑥ 结果交给模型整理</text>

  <!-- Step 7: 大模型 → 用户 -->
  <line x1="570" y1="385" x2="138" y2="385" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <text x="350" y="377" text-anchor="middle" fill="#fb923c" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="500">⑦ 返回自然语言回答</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <style>
      .title { font: 700 22px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 15px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .l1 { fill: #eaf3ff; stroke: #5f95d1; stroke-width: 1.5; rx: 12; }
      .l2 { fill: #eefaf3; stroke: #71b78d; stroke-width: 1.5; rx: 12; }
      .l3 { fill: #fff8e8; stroke: #d6b15a; stroke-width: 1.5; rx: 12; }
      .l4 { fill: #f8fbff; stroke: #93b6dc; stroke-width: 1.5; rx: 12; }
      .arrow { stroke: #5f8ec0; stroke-width: 2.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5f8ec0"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#ffffff" rx="8"/>
  <text x="40" y="38" class="title">AI 技术栈全景图</text>
  <!-- 第1层：Agent Skill -->
  <rect x="260" y="60" width="360" height="55" class="l1"/>
  <text x="440" y="84" text-anchor="middle" class="label">Agent Skill</text>
  <text x="440" y="102" text-anchor="middle" class="sub">给 Agent 的操作手册和工作规范</text>
  <!-- 第2层：Agent -->
  <rect x="200" y="135" width="480" height="55" class="l2"/>
  <text x="440" y="159" text-anchor="middle" class="label">Agent</text>
  <text x="440" y="177" text-anchor="middle" class="sub">规划步骤、调用工具、根据结果持续推进任务</text>
  <!-- 第3层左：Tool / MCP -->
  <rect x="80" y="215" width="320" height="55" class="l3"/>
  <text x="240" y="239" text-anchor="middle" class="label">Tool / MCP</text>
  <text x="240" y="257" text-anchor="middle" class="sub">连接外部能力（搜索、数据库、文件系统等）</text>
  <!-- 第3层右：LLM + Context -->
  <rect x="420" y="215" width="380" height="55" class="l4"/>
  <text x="610" y="239" text-anchor="middle" class="label">LLM + Context Window</text>
  <text x="610" y="257" text-anchor="middle" class="sub">在上下文容量内完成推理与生成</text>
  <!-- 第4层：Prompt / Token / RAG -->
  <rect x="260" y="295" width="360" height="55" class="l1"/>
  <text x="440" y="319" text-anchor="middle" class="label">Prompt / Token / RAG</text>
  <text x="440" y="337" text-anchor="middle" class="sub">决定输入如何组织、切分与补充</text>
  <!-- 箭头 -->
  <path d="M440 115 V133" class="arrow"/>
  <path d="M350 190 L280 213" class="arrow"/>
  <path d="M530 190 L580 213" class="arrow"/>
  <path d="M610 270 V293" class="arrow"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="880" height="220" viewBox="0 0 880 220">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="880" height="220" fill="#020617"/>
  <rect width="880" height="220" fill="url(#grid)"/>

  <text x="40" y="32" fill="white" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">RAG：只把"最相关的内容"送进模型</text>

  <!-- Arrows -->
  <line x1="178" y1="100" x2="196" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="348" y1="100" x2="366" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="518" y1="100" x2="536" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="688" y1="100" x2="706" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 文档库 -->
  <rect x="30" y="64" width="150" height="72" rx="6" fill="#0f172a"/>
  <rect x="30" y="64" width="150" height="72" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="105" y="94" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">原始文档库</text>
  <text x="105" y="112" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">手册、知识库、FAQ</text>

  <!-- 切分建索引 -->
  <rect x="198" y="64" width="152" height="72" rx="6" fill="#0f172a"/>
  <rect x="198" y="64" width="152" height="72" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="274" y="94" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">切分与建索引</text>
  <text x="274" y="112" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">Chunk + Embedding</text>

  <!-- 检索 -->
  <rect x="368" y="64" width="152" height="72" rx="6" fill="#0f172a"/>
  <rect x="368" y="64" width="152" height="72" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="444" y="94" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">检索相关片段</text>
  <text x="444" y="112" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">语义匹配 Top-K</text>

  <!-- 组装 -->
  <rect x="538" y="64" width="152" height="72" rx="6" fill="#0f172a"/>
  <rect x="538" y="64" width="152" height="72" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="614" y="94" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">组装 Context</text>
  <text x="614" y="112" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">问题 + 相关片段</text>

  <!-- LLM -->
  <rect x="708" y="64" width="132" height="72" rx="6" fill="#0f172a"/>
  <rect x="708" y="64" width="132" height="72" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="774" y="94" text-anchor="middle" fill="white" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">LLM</text>
  <text x="774" y="112" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">生成答案</text>

  <!-- 底部说明 -->
  <rect x="100" y="164" width="680" height="28" rx="4" fill="rgba(15, 23, 42, 0.5)" stroke="#1e293b" stroke-width="1"/>
  <text x="440" y="182" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">关键收益：避免把整本资料塞进上下文，降低成本，同时绕开上下文长度限制</text>
</svg>

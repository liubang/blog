<svg xmlns="http://www.w3.org/2000/svg" width="880" height="220" viewBox="0 0 880 220">
  <defs>
    <style>
      .title { font: 700 22px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .label { font: 600 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #16324f; }
      .sub { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4b647a; }
      .note { font: 500 12px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #6b8299; }
      .box1 { fill: #f7fbff; stroke: #7fa8d8; stroke-width: 1.5; rx: 12; }
      .box2 { fill: #eefaf3; stroke: #73b78f; stroke-width: 1.5; rx: 12; }
      .box3 { fill: #fff8e8; stroke: #d8b35f; stroke-width: 1.5; rx: 12; }
      .arrow { stroke: #5f8ec0; stroke-width: 2.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5f8ec0"/>
    </marker>
  </defs>
  <rect width="880" height="220" fill="#ffffff" rx="8"/>
  <text x="40" y="38" class="title">RAG：只把"最相关的内容"送进模型</text>
  <!-- 文档库 -->
  <rect x="30" y="65" width="150" height="80" class="box1"/>
  <text x="105" y="96" text-anchor="middle" class="label">原始文档库</text>
  <text x="105" y="116" text-anchor="middle" class="sub">手册、知识库、FAQ</text>
  <!-- 切分建索引 -->
  <rect x="210" y="65" width="150" height="80" class="box2"/>
  <text x="285" y="96" text-anchor="middle" class="label">切分与建索引</text>
  <text x="285" y="116" text-anchor="middle" class="sub">Chunk + Embedding</text>
  <!-- 检索 -->
  <rect x="390" y="65" width="150" height="80" class="box3"/>
  <text x="465" y="96" text-anchor="middle" class="label">检索相关片段</text>
  <text x="465" y="116" text-anchor="middle" class="sub">语义匹配 Top-K</text>
  <!-- 组装 -->
  <rect x="570" y="65" width="150" height="80" class="box2"/>
  <text x="645" y="96" text-anchor="middle" class="label">组装 Context</text>
  <text x="645" y="116" text-anchor="middle" class="sub">问题 + 相关片段</text>
  <!-- LLM -->
  <rect x="750" y="65" width="100" height="80" class="box1"/>
  <text x="800" y="96" text-anchor="middle" class="label">LLM</text>
  <text x="800" y="116" text-anchor="middle" class="sub">生成答案</text>
  <!-- 箭头 -->
  <path d="M180 105 H208" class="arrow"/>
  <path d="M360 105 H388" class="arrow"/>
  <path d="M540 105 H568" class="arrow"/>
  <path d="M720 105 H748" class="arrow"/>
  <!-- 底部说明 -->
  <text x="440" y="190" text-anchor="middle" class="note">关键收益：避免把整本资料塞进上下文，降低成本，同时绕开上下文长度限制。</text>
</svg>
